<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>Dashboard</title>
  <link rel="stylesheet" href="../styles/styles.css"/>
  <link rel="stylesheet" href="../styles/dashboard.css"/>
</head>

<body>

<main>
  <h2>Your Groups</h2>

  <ul id="groupList"></ul>

  <!-- Invite Section -->
  <section id="inviteSection">
    <h3>Pending Invites</h3>
  </section>

  <!-- Send Invite -->
  <section>
    <h3>Invite Member</h3>

    <input type="email" id="inviteEmail" placeholder="Enter Email" />
    <button id="inviteBtn">Invite</button>

    <p id="inviteMessage"></p>
  </section>

  <a href="groupCreate.html">
    <button>Create New Group</button>
  </a>

</main>

<script type="module">
import { getUserGroups } from "../src/dashboardService.js";
import { sendInvite, acceptInvite, declineInvite } from "../src/groupService.js";
import { listenForAuth } from "../src/auth.js";
import { auth, db } from "../src/firebase.js";
import { doc, getDoc } from "firebase/firestore";

const groupList = document.getElementById("groupList");
const inviteSection = document.getElementById("inviteSection");
const inviteBtn = document.getElementById("inviteBtn");
const inviteMessage = document.getElementById("inviteMessage");

let selectedGroupId = null;
let userRole = null;

//get user role in a group
const getUserRole = async (groupId) => {
  const user = auth.currentUser;
  if (!user) return null;

  const roleSnap = await getDoc(
    doc(db, "groups", groupId, "members", user.uid)
  );

  return roleSnap.exists() ? roleSnap.data().role : null;
};

//load user groups
const loadGroups = async () => {
  const groups = await getUserGroups();
  groupList.innerHTML = "";

  if (groups.length === 0) {
    groupList.innerHTML = "<p>No groups yet</p>";
    return;
  }

  groups.forEach(group => {
    const li = document.createElement("li");
    li.textContent = group.id; 

    li.onclick = async () => {
      selectedGroupId = group.id;
      userRole = await getUserRole(group.id);

      alert(`Selected: ${group.id} (Role: ${userRole})`);
    };

    groupList.appendChild(li);
  });
};

//authentication and invite flow added
listenForAuth(async (user, invites) => {
  if (!user) return;

  await loadGroups();

  inviteSection.innerHTML = "<h3>Pending Invites</h3>";

  if (invites.length === 0) {
    inviteSection.innerHTML += "<p>No pending invites</p>";
    return;
  }

  invites.forEach(invite => {
    const p = document.createElement("p");
    p.textContent = `Invite to group ${invite.groupId}`;

    const acceptBtn = document.createElement("button");
    acceptBtn.textContent = "Accept";

    const declineBtn = document.createElement("button");
    declineBtn.textContent = "Decline";

    //Accept invite
    acceptBtn.onclick = async () => {
      await acceptInvite(invite, user);
      location.reload();
    };

    //Decline invite
    declineBtn.onclick = async () => {
      await declineInvite(invite.id);
      location.reload();
    };

    inviteSection.appendChild(p);
    inviteSection.appendChild(acceptBtn);
    inviteSection.appendChild(declineBtn);
  });
});


//send invite
inviteBtn.addEventListener("click", async () => {
  const email = document.getElementById("inviteEmail").value;

  if (!selectedGroupId) {
    alert("Please select a group first");
    return;
  }

  if (userRole !== "admin") {
    alert("Only admins can invite members");
    return;
  }

  try {
    await sendInvite(email, selectedGroupId);
    inviteMessage.textContent = "Invite sent!";
  } catch (err) {
    console.error(err);
    inviteMessage.textContent = "Error sending invite";
  }
});
</script>

</body>
</html>
