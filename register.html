<!-- register.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register — Stokvel</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/theme.css" />
  <link rel="stylesheet" href="css/register.css" />
</head>
<body>
  <div class="register-page">
    <div class="register-card">
      <div class="register-card__header">
        <div class="register-card__logo">Stokvel</div>
        <h1 class="register-card__title">Create an account</h1>
        <p class="register-card__sub">Join your stokvel and start saving together</p>
      </div>

      <div class="register-card__body">
        <div id="alertMessage" class="alert alert--hidden"></div>

        <form id="registerForm">
          <div class="form-group">
            <label class="form-label">Email</label>
            <input type="email" id="email" class="form-input" placeholder="you@example.com" required>
          </div>

          <div class="form-group">
            <label class="form-label">Password</label>
            <input type="password" id="password" class="form-input" placeholder="Create a strong password" required>
          </div>

          <div class="form-group">
            <label class="form-label">Role</label>
            <select id="role" class="form-select">
              <option value="Member">Member</option>
              <option value="Treasurer">Treasurer</option>
              <option value="Admin">Admin</option>
            </select>
          </div>
      

          <button type="submit" class="btn btn--primary btn--full">Create account</button>
        </form>

        <!-- Add this after your existing form, before the footer -->
<div class="divider">
  <span>or</span>
</div>

<button type="button" id="googleRegisterBtn" class="btn btn--outline btn--full">
  Continue with Google
</button>
      </div>

      <div class="register-card__footer">
        <p>Already have an account? <a href="login.html">Sign in</a></p>
      </div>
    </div>
  </div>

  <script type="module" src="js/register.js"></script>
</body>
</html>
