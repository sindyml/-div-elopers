<script type="module">
  import { privateRoute, roleGuard } from "../js/auth.js";

  privateRoute();       // must be logged in
  roleGuard("Admin");   // must be Admin
</script>
export function privateRoute() {
  auth.onAuthStateChanged((user) => {
    if (!user) {
      window.location.href = "login.html";
    }
  });
}
