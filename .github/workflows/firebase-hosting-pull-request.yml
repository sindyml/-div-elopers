name: Deploy to Firebase Hosting on PR

on: pull_request

jobs:
  build_and_preview:
    # Only run if Firebase is configured and PR is from same repo
    if: ${{ github.event.pull_request.head.repo.full_name == github.repository && secrets.FIREBASE_SERVICE_ACCOUNT != '' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Optional: Add any build steps here if needed
      # - name: Install dependencies
      #   run: npm ci
      # - name: Build
      #   run: npm run build

      - name: Deploy to Firebase Hosting Preview Channel
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: '${{ secrets.GITHUB_TOKEN }}'
          firebaseServiceAccount: '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}'
