name: Deploy StokPal to Azure Web App

on:
  push:
    branches:
      - main
  workflow_dispatch:  # allows manual trigger from GitHub Actions tab

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Build and Deploy

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      # No npm install needed — we have no dependencies (pure Node built-ins)
      # If you add packages later, uncomment the line below:
      # - run: npm install

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          # ⚠️  Add this secret in GitHub:
          #   Repo → Settings → Secrets and variables → Actions
          #   → New repository secret
          #   Name:  AZURE_WEBAPP_PUBLISH_PROFILE
          #   Value: paste the full XML from Azure → Download publish profile
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}

          app-name: stockpal-app   # ← must match your Azure Web App name exactly
          package: .               # deploy everything in the repo root