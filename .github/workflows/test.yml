name: Tests & Coverage

on:
  push:
    branches: [main, MainWithTesting]
  pull_request:
    branches: [main, MainWithTesting]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      # ── Checkout & Node setup ─────────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # ── Java (required by Firebase Emulator) ─────────────────────────────
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      # ── Firebase CLI ──────────────────────────────────────────────────────
      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Cache Firebase Emulators
        uses: actions/cache@v4
        with:
          path: ~/.cache/firebase/emulators
          key: firebase-emulators-${{ runner.os }}

      # ── Frontend tests with coverage ──────────────────────────────────────
      - name: Run frontend tests
        run: npx vitest run --config vitest.config.js --coverage

      # ── Integration tests with coverage ───────────────────────────────────
      - name: Run integration tests
        run: firebase emulators:exec --only auth,firestore "npx vitest run --config vitest.integration.config.js --coverage"
        env:
          FIRESTORE_EMULATOR_HOST: '127.0.0.1:8080'
          FIREBASE_AUTH_EMULATOR_HOST: '127.0.0.1:9099'

      # ── Generate coverage charts in job summary ───────────────────────────
      - name: Display coverage charts
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            let summary;
            try {
              summary = JSON.parse(fs.readFileSync('coverage/coverage-summary.json', 'utf8'));
            } catch (e) {
              core.summary.addRaw('⚠️ Coverage summary not found.').write();
              return;
            }

            const total = summary.total;
            const metrics = {
              Statements: total.statements.pct,
              Branches:   total.branches.pct,
              Functions:  total.functions.pct,
              Lines:      total.lines.pct,
            };
            const labels  = Object.keys(metrics);
            const values  = Object.values(metrics);
            const avg     = Math.round(values.reduce((a, v) => a + v, 0) / values.length);
            const badge   = avg >= 80 ? '✅' : avg >= 50 ? '⚠️' : '❌';

            // ── Bar chart (quickchart.io) ───────────────────────────────────
            const barChart = {
              type: 'bar',
              data: {
                labels,
                datasets: [{
                  label: 'Coverage %',
                  data: values,
                  backgroundColor: values.map(v =>
                    v >= 80 ? 'rgba(34,197,94,0.8)' :
                    v >= 50 ? 'rgba(234,179,8,0.8)' :
                              'rgba(239,68,68,0.8)'
                  ),
                  borderColor: values.map(v =>
                    v >= 80 ? 'rgba(22,163,74,1)' :
                    v >= 50 ? 'rgba(202,138,4,1)' :
                              'rgba(220,38,38,1)'
                  ),
                  borderWidth: 2,
                }],
              },
              options: {
                plugins: {
                  title: {
                    display: true,
                    text: `Code Coverage — Average: ${avg}%`,
                    font: { size: 16 },
                  },
                  legend: { display: false },
                },
                scales: {
                  y: {
                    min: 0,
                    max: 100,
                    ticks: { callback: (v) => v + '%' },
                  },
                },
              },
            };

            // ── Pie chart (quickchart.io) ──────────────────────────────────
            const pieChart = {
              type: 'pie',
              data: {
                labels,
                datasets: [{
                  data: values,
                  backgroundColor: [
                    'rgba(34,197,94,0.8)',
                    'rgba(59,130,246,0.8)',
                    'rgba(168,85,247,0.8)',
                    'rgba(249,115,22,0.8)',
                  ],
                }],
              },
              options: {
                plugins: {
                  title: {
                    display: true,
                    text: 'Coverage Distribution',
                    font: { size: 16 },
                  },
                },
              },
            };

            const encode = (chart) =>
              'https://quickchart.io/chart?w=500&h=300&c=' +
              encodeURIComponent(JSON.stringify(chart));

            const barUrl = encode(barChart);
            const pieUrl = encode(pieChart);

            // ── Bar table ─────────────────────────────────────────────────
            function bar(pct) {
              const filled = Math.round(pct / 5);
              const empty  = 20 - filled;
              const color  = pct >= 80 ? '🟩' : pct >= 50 ? '🟨' : '🟥';
              return color.repeat(filled) + '⬜'.repeat(empty) + `  **${pct}%**`;
            }

            let md = `## ${badge} Code Coverage Report\n\n`;
            md += `> Average coverage: **${avg}%**\n\n`;

            // Table
            md += `| Metric | Coverage |\n`;
            md += `|--------|----------|\n`;
            for (const [label, pct] of Object.entries(metrics)) {
              md += `| **${label}** | ${bar(pct)} |\n`;
            }
            md += `\n> 🟩 = 80%+  &nbsp; 🟨 = 50–79%  &nbsp; 🟥 = below 50%\n\n`;

            // Charts
            md += `### 📊 Bar Chart\n`;
            md += `![Coverage Bar Chart](${barUrl})\n\n`;
            md += `### 🥧 Pie Chart\n`;
            md += `![Coverage Pie Chart](${pieUrl})\n`;

            await core.summary.addRaw(md).write();

      # ── Upload full HTML coverage report as artifact ──────────────────────
      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7