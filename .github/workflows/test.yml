name: Tests & Coverage

on:
  push:
    branches: [main, MainWithTesting]
  pull_request:
    branches: [main, MainWithTesting]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      # ── Checkout & Node setup ─────────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # ── Java (required by Firebase Emulator) ─────────────────────────────
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      # ── Firebase CLI ──────────────────────────────────────────────────────
      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Cache Firebase Emulators
        uses: actions/cache@v4
        with:
          path: ~/.cache/firebase/emulators
          key: firebase-emulators-${{ runner.os }}

      # ── Frontend tests with coverage ──────────────────────────────────────
      - name: Run frontend tests
        run: npx vitest run --config vitest.config.js --coverage

      # ── Integration tests with coverage ───────────────────────────────────
      - name: Run integration tests
        run: firebase emulators:exec --only auth,firestore "npx vitest run --config vitest.integration.config.js --coverage"
        env:
          FIRESTORE_EMULATOR_HOST: '127.0.0.1:8080'
          FIREBASE_AUTH_EMULATOR_HOST: '127.0.0.1:9099'

      # ── Debug: list coverage files so we can see what was generated ───────
      - name: List coverage files
        if: always()
        run: |
          echo "=== Coverage directory contents ==="
          find . -name "coverage-summary.json" 2>/dev/null || echo "No coverage-summary.json found anywhere"
          find . -name "*.json" -path "*/coverage/*" 2>/dev/null || echo "No coverage JSON files found"

      # ── Merge coverage summaries into one file ────────────────────────────
      - name: Merge coverage summaries
        if: always()
        run: |
          node - << 'JS'
            const fs = require('fs');

            // Find all coverage-summary.json files
            const { execSync } = require('child_process');
            const files = execSync('find . -name "coverage-summary.json" 2>/dev/null')
              .toString().trim().split('\n').filter(Boolean);

            console.log('Found coverage files:', files);

            if (files.length === 0) {
              console.log('No coverage files found, creating empty summary');
              fs.mkdirSync('./coverage', { recursive: true });
              fs.writeFileSync('./coverage/coverage-summary.json', JSON.stringify({
                total: {
                  statements: { pct: 0 },
                  branches:   { pct: 0 },
                  functions:  { pct: 0 },
                  lines:      { pct: 0 },
                }
              }));
              process.exit(0);
            }

            // Merge all summaries by averaging percentages
            const summaries = files.map(f => JSON.parse(fs.readFileSync(f, 'utf8')));
            const merged = { total: {
              statements: { pct: 0 },
              branches:   { pct: 0 },
              functions:  { pct: 0 },
              lines:      { pct: 0 },
            }};

            const metrics = ['statements', 'branches', 'functions', 'lines'];
            for (const m of metrics) {
              const valid = summaries.filter(s => s.total && s.total[m]);
              merged.total[m].pct = valid.length > 0
                ? Math.round(valid.reduce((a, s) => a + s.total[m].pct, 0) / valid.length)
                : 0;
            }

            fs.mkdirSync('./coverage', { recursive: true });
            fs.writeFileSync('./coverage/coverage-summary.json', JSON.stringify(merged, null, 2));
            console.log('Merged summary:', JSON.stringify(merged.total, null, 2));
          JS

      # ── Generate coverage charts in job summary ───────────────────────────
      - name: Display coverage charts
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            let summary;
            try {
              summary = JSON.parse(fs.readFileSync('coverage/coverage-summary.json', 'utf8'));
            } catch (e) {
              core.summary.addRaw('⚠️ Coverage summary not found. Make sure `@vitest/coverage-v8` is installed and coverage is configured in your vitest config files.').write();
              return;
            }

            const total = summary.total;
            const metrics = {
              Statements: total.statements.pct,
              Branches:   total.branches.pct,
              Functions:  total.functions.pct,
              Lines:      total.lines.pct,
            };
            const labels  = Object.keys(metrics);
            const values  = Object.values(metrics);
            const avg     = Math.round(values.reduce((a, v) => a + v, 0) / values.length);
            const badge   = avg >= 80 ? '✅' : avg >= 50 ? '⚠️' : '❌';

            // ── Bar chart ─────────────────────────────────────────────────
            const barChart = {
              type: 'bar',
              data: {
                labels,
                datasets: [{
                  label: 'Coverage %',
                  data: values,
                  backgroundColor: values.map(v =>
                    v >= 80 ? 'rgba(34,197,94,0.8)' :
                    v >= 50 ? 'rgba(234,179,8,0.8)' :
                              'rgba(239,68,68,0.8)'
                  ),
                  borderColor: values.map(v =>
                    v >= 80 ? 'rgba(22,163,74,1)' :
                    v >= 50 ? 'rgba(202,138,4,1)' :
                              'rgba(220,38,38,1)'
                  ),
                  borderWidth: 2,
                }],
              },
              options: {
                plugins: {
                  title: {
                    display: true,
                    text: `Code Coverage — Average: ${avg}%`,
                    font: { size: 16 },
                  },
                  legend: { display: false },
                },
                scales: {
                  y: { min: 0, max: 100, ticks: { callback: (v) => v + '%' } },
                },
              },
            };

            // ── Pie chart ─────────────────────────────────────────────────
            const pieChart = {
              type: 'pie',
              data: {
                labels,
                datasets: [{
                  data: values,
                  backgroundColor: [
                    'rgba(34,197,94,0.8)',
                    'rgba(59,130,246,0.8)',
                    'rgba(168,85,247,0.8)',
                    'rgba(249,115,22,0.8)',
                  ],
                }],
              },
              options: {
                plugins: {
                  title: {
                    display: true,
                    text: 'Coverage Distribution',
                    font: { size: 16 },
                  },
                },
              },
            };

            const encode = (chart) =>
              'https://quickchart.io/chart?w=500&h=300&c=' +
              encodeURIComponent(JSON.stringify(chart));

            function bar(pct) {
              const filled = Math.round(pct / 5);
              const empty  = 20 - filled;
              const color  = pct >= 80 ? '🟩' : pct >= 50 ? '🟨' : '🟥';
              return color.repeat(filled) + '⬜'.repeat(empty) + `  **${pct}%**`;
            }

            let md = `## ${badge} Code Coverage Report\n\n`;
            md += `> Average coverage: **${avg}%**\n\n`;
            md += `| Metric | Coverage |\n`;
            md += `|--------|----------|\n`;
            for (const [label, pct] of Object.entries(metrics)) {
              md += `| **${label}** | ${bar(pct)} |\n`;
            }
            md += `\n> 🟩 = 80%+  &nbsp; 🟨 = 50–79%  &nbsp; 🟥 = below 50%\n\n`;
            md += `### 📊 Bar Chart\n`;
            md += `![Coverage Bar Chart](${encode(barChart)})\n\n`;
            md += `### 🥧 Pie Chart\n`;
            md += `![Coverage Pie Chart](${encode(pieChart)})\n`;

            await core.summary.addRaw(md).write();

      # ── Upload full HTML coverage report as artifact ──────────────────────
      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7