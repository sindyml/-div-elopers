<!DOCTYPE html>
<!-- this should only be available to admins and treasurers -->>
<html lang="en-ZA">
<head>
    <title> StokPal Meeting Form</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script>
        <!-- idk what to put here yet. for defining client-side javaScript at a later point-->
    </script>
    <link rel="stylesheet" href="theme.css">
    <link rel="stylesheet" href="Meeting_Form.css">

</head>
<body>
    <h1>Position: Admin/Treasurer</h1>
    <h2>Name & Surname</h2>
    <hr> 
    <form> 
        <label for="meeting date">Select a meeting date:</label>
        <input type="date" id="meeting date" required> <!--do i need to add a name? convert to string for the db-->
        <label for="meeting times">Select a meeting start time between 8AM and 8PM:</label>
        <input type="time" id="meeting time" min="08:00" max="20:00" step="900" required> <!--do i need to add a name-->
        <label for="meeting location">Select a meeting location:</label>
        <select id="meeting location" required>
            <option value="zoom">Zoom</option>
            <option value="google meet">Google Meet</option>
            <option value="in-person">In-person</option>
            <option value="whatsapp">Whatsapp</option> <!--these should be strings in the db. if in-person is chosen, textarea pops up and what is typed there gets stored in the location field in the db-->
        </select>
        <label for="agenda">Meeting Agenda:</label>
        <textarea id="agenda" rows="10" cols="30">Fill in meeting agenda notes here...</textarea>
        <!--how to make the textarea text here greyed out?-->
        <!--link the groups the admin/treasurer thats logged in is a part of using a datalist-->
        <label for="group">Select the group for this meeting:</label>
        <input list="groupOptions" id="group" name="group" required> <!--id here must match id in db?-->
        <datalist id="groupOptions"></datalist>
        <button type="submit" class="btn-submit">Submit</button><!--what's the point of having a class?-->
        <script type="module" src=".Meeting_Form.js"></script> <!-- what's this for?-->
    </form>

    <!-- meeting list aka. task 3 & notification banner of task 4-->
    <section id="meeting-list" aria-labelledby="meeting-list-title">
     <h2 id="meeting-list-title">Upcoming Meetings</h2>

    <!-- Example meeting entry --><!--REMOVE THIS ARTICLE BUT USE IT'S STRUCYURE FOR HOW MEETINGS SHOULD SHOW UP -->
    <article class="meeting-card">
     <header>
      <h3>Group: Savings Club A</h3>
     </header>
     <p>
      <time datetime="2026-04-10T18:00">April 10, 2026 at 6:00 PM</time>
     </p>
     <p><strong>Location:</strong> Community Hall</p>
     <p><strong>Agenda:</strong> Monthly contribution review and payout schedule</p>
    </article>
  </section>

  <!-- Notification banner -->
  <aside id="notification-banner" class="notification-banner" role="alert" aria-live="polite" hidden>
   <header>
    <h3>New Meeting Scheduled</h3>
   </header>
   <p id="notification-body">
     A new meeting has been scheduled for your group.
   </p>
   <button type="button" class="notification-banner__close" aria-label="Close notification">×</button>
  </aside>

</body>
</html>
