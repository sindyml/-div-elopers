<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Payment Confirmation | StokPal</title>
  <style>
    body { font-family: Arial, sans-serif; text-align: center; padding: 50px; }
    .btn { display: inline-block; padding: 10px 20px; background: #3498db; color: white; text-decoration: none; border-radius: 5px; margin: 10px; }
    .btn-secondary { background: #95a5a6; }
    .btn-danger { background: #e74c3c; }
    .success { color: #27ae60; }
    .failed { color: #e74c3c; }
  </style>
</head>
<body>
  <div id="content">
    <h2>Processing...</h2>
    <p>Please wait.</p>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="js/firebase-compat-init.js"></script>
  <script>
    const params = new URLSearchParams(window.location.search);
    const sessionId = params.get('session_id');
    const cancelled = params.get('cancelled');
    const content = document.getElementById('content');

    localStorage.removeItem('pendingPaymentId');

    // If redirected from cancel page
    if (cancelled === 'true') {
      content.innerHTML = `
        <h2 class="failed">❌ Payment Cancelled</h2>
        <p>Your payment was cancelled. No charge was made.</p>
        <a href="/payment.html" class="btn btn-danger">Try Again</a>
        <a href="/dashboard.html" class="btn btn-secondary">Go to Dashboard</a>
      `;
    }
    // If we have a session_id, Stripe redirected here after checkout — treat as success
    else if (sessionId) {
      content.innerHTML = `
        <h2 class="success">✅ Payment Successful!</h2>
        <p>Your payment has been confirmed. Your dashboard will reflect the update shortly.</p>
        <a href="/dashboard.html" class="btn">Go to Dashboard</a>
        <a href="/payment-history.html" class="btn btn-secondary">View History</a>
      `;
    }
    // No session_id — something went wrong
    else {
      content.innerHTML = `
        <h2 class="failed">⚠️ Something went wrong</h2>
        <p>We could not confirm your payment. Please check your dashboard or try again.</p>
        <a href="/payment.html" class="btn btn-danger">Try Again</a>
        <a href="/dashboard.html" class="btn btn-secondary">Go to Dashboard</a>
      `;
    }
  </script>
</body>
</html>
