<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Payment Confirmation | Stockpal</title>
  <style>
    body { font-family: Arial, sans-serif; text-align: center; padding: 50px; }
    .spinner {
      border: 4px solid #f3f3f3;
      border-top: 4px solid #3498db;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
      margin: 20px auto;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    .btn { display: inline-block; padding: 10px 20px; background: #3498db; color: white; text-decoration: none; border-radius: 5px; margin: 10px; }
    .btn-secondary { background: #95a5a6; }
  </style>
</head>
<body>
  <div class="spinner" id="spinner"></div>
  <h2 id="title">Processing your payment...</h2>
  <p id="message">Please wait while we confirm your payment.</p>
  <div id="buttons" style="display: none;">
    <a href="/dashboard.html" class="btn">Go to Dashboard</a>
    <a href="/payment-history.html" class="btn btn-secondary">View History</a>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="js/firebase-compat-init.js"></script>

  <script>
    const API_BASE_URL = 'https://div-elopers.onrender.com';
    let paymentId = localStorage.getItem('pendingPaymentId');
    let attempts = 0;

    async function checkStatus() {
      attempts++;
      
      // Wait for Firebase
      if (!firebase.auth().currentUser && attempts < 20) {
        setTimeout(checkStatus, 500);
        return;
      }
      
      const user = firebase.auth().currentUser;
      if (!user) {
        document.getElementById('title').innerHTML = 'Please log in';
        document.getElementById('spinner').style.display = 'none';
        document.getElementById('buttons').style.display = 'block';
        return;
      }
      
      if (!paymentId) {
        document.getElementById('title').innerHTML = '✅ Payment Successful!';
        document.getElementById('spinner').style.display = 'none';
        document.getElementById('buttons').style.display = 'block';
        return;
      }
      
      try {
        const token = await user.getIdToken();
        const response = await fetch(`${API_BASE_URL}/api/payments/status/${paymentId}`, {
          headers: { 'Authorization': `Bearer ${token}` }
        });
        
        if (response.ok) {
          const data = await response.json();
          if (data.status === 'completed') {
            document.getElementById('title').innerHTML = '✅ Payment Successful!';
            document.getElementById('spinner').style.display = 'none';
            document.getElementById('buttons').style.display = 'block';
            localStorage.removeItem('pendingPaymentId');
            return;
          }
        }
      } catch(e) {
        console.log('Polling error:', e);
      }
      
      // Try again if not timeout (45 attempts = 90 seconds)
      if (attempts < 45) {
        setTimeout(checkStatus, 2000);
      } else {
        document.getElementById('title').innerHTML = 'Check your dashboard later';
        document.getElementById('spinner').style.display = 'none';
        document.getElementById('buttons').style.display = 'block';
      }
    }
    
    setTimeout(checkStatus, 1000);
  </script>
</body>
</html>
