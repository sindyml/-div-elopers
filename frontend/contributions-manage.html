<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StokPal - Manage Contributions</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="css/theme.css">
    <link rel="stylesheet" href="css/app.css">
    <link rel="stylesheet" href="css/contributions.css">

    <style>
        /* ── Neutralise contributions.css's bare `header` rule ──
           That rule targets every <header> on the page, including
           #navbar-root which navbar.js owns. Reset it to nothing so
           only navbar.js's own injected styles apply to the navbar. */
        #navbar-root {
            background: none !important;
            padding: 0 !important;
            display: block !important;
            box-shadow: none !important;
            justify-content: unset !important;
            align-items: unset !important;
        }

        /* Restore navbar.js inner layout — contributions.css's bare
           nav{} rule overrides the injected .navbar__inner flex layout,
           collapsing the logo/user/sign-out into a narrow left-side box.
           These rules re-apply what navbar.js expects. */
        #navbar-root .navbar__inner {
            display: flex !important;
            align-items: center !important;
            justify-content: space-between !important;
            max-width: 1120px !important;
            margin: 0 auto !important;
            padding: 0 1.5rem !important;
            height: 64px !important;
            gap: 1rem !important;
        }

        #navbar-root nav.navbar__links,
        #navbar-root nav.nav__auth,
        #navbar-root div.nav__user {
            display: flex !important;
            gap: 0.75rem !important;
            align-items: center !important;
            flex-direction: row !important;
            padding: 0 !important;
            margin: 0 !important;
        }

        /* Page-header styles matching meetings.css */
        header.page-header { margin-bottom: 2.5rem; }

        header.page-header p.label {
            display: inline-block;
            font-size: 0.75rem;
            font-weight: 500;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: #1D9E75;
            margin-bottom: 0.5rem;
        }

        header.page-header h1 {
            font-family: 'DM Serif Display', serif;
            font-size: clamp(1.75rem, 4vw, 2.5rem);
            line-height: 1.15;
            margin-bottom: 0.5rem;
            border: none;
            padding: 0;
            color: #1A1A1A;
        }

        header.page-header p.subtitle {
            font-size: 1rem;
            color: #6B7280;
            max-width: 520px;
            background: none;
            padding: 0;
            text-align: left;
            box-shadow: none;
            border-radius: 0;
        }

        header.page-header button.primary {
            margin-top: 1rem;
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.9375rem;
            font-weight: 500;
            border-radius: 10px;
            cursor: pointer;
            transition: background 0.15s, border-color 0.15s, transform 0.1s;
            border: 1.5px solid #2A7A5A;
            padding: 0.65rem 1.5rem;
            background: #2A7A5A;
            color: #fff;
        }

        header.page-header button.primary:hover {
            background: #225f46;
            border-color: #225f46;
        }

        header.page-header button.primary:active { transform: scale(0.98); }
        
        /* ADDED FOR COLLAPSE/PAGINATION - Collapsible row styles */
        .member-row {
            cursor: pointer;
            background-color: #f9f9f9;
        }
        .member-row:hover {
            background-color: #f0f0f0;
        }
        .contributions-row {
            background-color: #ffffff;
        }
        .contributions-row td {
            padding: 0;
        }
        .contributions-container {
            padding: 0.5rem 0 0.5rem 2rem;
            width: 100%;
        }
        .contributions-container table {
            margin: 0;
            width: 100%;
        }
        .expand-icon {
            font-size: 1rem;
            margin-right: 0.5rem;
            display: inline-block;
            width: 20px;
        }
    </style>

</head>
<body class="app-layout">

    <header id="navbar-root"></header>

    <main class="app-main">
        <header class="page-header">
            <hgroup>
                <h1 class="page-header__title">Manage Contributions</h1>
                <p class="page-header__sub">Confirm or flag member payments as Treasurer or Admin.</p>
            </hgroup>
        </header>

         <button onclick="window.location.href='dashboard.html'" class="btn btn--secondary" style="margin-bottom: 1rem;">
            ← Back to Dashboard
        </button>

        <!-- PENDING DISPUTES section -->
        <section id="pending-disputes-section" aria-labelledby="disputes-heading">
            <h2 id="disputes-heading">PENDING DISPUTES</h2>
            <button id="viewPendingDisputesBtn" class="btn btn--primary">View Pending Disputes</button>
            <article id="pendingDisputesContainer" class="card" style="margin-top: var(--space-4);">
                <div class="data-table-wrapper">
                    <table class="data-table" aria-label="Pending disputes table">
                        <thead>
                            <tr>
                                <th>Member</th>
                                <th>Group</th>
                                <th>Amount</th>
                                <th>Deadline</th>
                                <th>Reason</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="pendingDisputesTableBody"></tbody>
                    </table>
                </div>
            </article>
        </section>

        <section id="manageContent" aria-live="polite"></section>
    </main>

    <footer id="footer-root"></footer>

    <script type="module">
        import { auth, db } from './js/firebase-config.js';
        import { collection, addDoc, getDocs, query, where, updateDoc, doc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
        import { 
            getCurrentUserId,
            getCurrentUserRole,
            getTreasurerGroups,
            getUserDisplayName,
            listenToGroupContributions,
            getPendingDisputes,
            updateContributionStatus,
            rejectDispute,
            approveDispute
        } from './js/contributions.js';

        let activeGroupId = null;
        let activeUnsubscribe = null;

        // ADDED FOR COLLAPSE/PAGINATION - Store expanded state for each member
        let expandedMembers = {};
        // ADDED FOR COLLAPSE/PAGINATION - Store current page for each member's contributions
        let memberCurrentPage = {};

        function goToDashboard() {
            window.location.href = 'dashboard.html';
        }

        // Load pending disputes for treasurer
        async function loadPendingDisputes() {
            const disputes = await getPendingDisputes();
            const tbody = document.getElementById('pendingDisputesTableBody');
            tbody.innerHTML = '';
            
            if (disputes.length === 0) {
                const row = tbody.insertRow();
                const cell = row.insertCell(0);
                cell.colSpan = 6;
                cell.textContent = 'No pending disputes.';
                return;
            }
            
            for (const dispute of disputes) {
                const row = tbody.insertRow();
                const memberName = await getUserDisplayName(dispute.userId);
                row.insertCell(0).textContent = memberName;
                row.insertCell(1).textContent = dispute.groupName || '—';
                row.insertCell(2).textContent = `R${dispute.amount || 0}`;
                row.insertCell(3).textContent = dispute.deadlineDate || '—';
                row.insertCell(4).textContent = dispute.reason || '—';
                
                const actionsCell = row.insertCell(5);
                
                const approveBtn = document.createElement('button');
                approveBtn.textContent = 'Approve';
                approveBtn.classList.add('btn', 'btn--success', 'btn--sm');
                approveBtn.addEventListener('click', async () => {
                    try {
                        approveBtn.disabled = true;
                        approveBtn.textContent = '...';
                        await approveDispute(dispute.id, dispute.contributionId);
                        alert('Dispute approved. Contribution status updated to confirmed.');
                        loadPendingDisputes(); // Refresh
                        loadManagePage(); // Refresh contribution table
                    } catch (err) {
                        console.error('Dispute approval failed:', err);
                        alert('Error: ' + err.message);
                        approveBtn.disabled = false;
                        approveBtn.textContent = 'Approve';
                    }
                });
                
                const rejectBtn = document.createElement('button');
                rejectBtn.textContent = 'Reject';
                rejectBtn.classList.add('btn', 'btn--danger', 'btn--sm');
                rejectBtn.addEventListener('click', async () => {
                    const reason = prompt('Reason for rejection:');
                    if (reason) {
                        await rejectDispute(dispute.id, reason);
                        alert('Dispute rejected.');
                        loadPendingDisputes(); // Refresh
                    }
                });
                
                actionsCell.appendChild(approveBtn);
                actionsCell.appendChild(rejectBtn);
            }
        }

        function displayGroupList(groups, container) {
            container.innerHTML = '';

            const instruction = document.createElement('p');
            instruction.textContent = 'Select a group to manage:';
            container.appendChild(instruction);

            const groupList = document.createElement('ul');
            groupList.classList.add('group-list');

            groups.forEach(group => {
                const listItem = document.createElement('li');
                listItem.classList.add('group-list-item');

                const groupName = document.createElement('strong');
                groupName.textContent = group.name;
                listItem.appendChild(groupName);
                listItem.appendChild(document.createElement('br'));

                const selectButton = document.createElement('button');
                selectButton.textContent = 'Select';
                selectButton.classList.add('btn', 'btn--primary');
                selectButton.addEventListener('click', () => {
                    loadContributionsForGroup(group.id, group.name);
                });
                listItem.appendChild(selectButton);

                groupList.appendChild(listItem);
            });

            container.appendChild(groupList);
        }

        // ADDED FOR COLLAPSE/PAGINATION - Function to render contributions for a single member with pagination
        async function renderMemberContributions(memberId, memberName, contributions, container, groupName, rowsPerPage = 5) {
            const page = memberCurrentPage[memberId] || 1;
            const start = (page - 1) * rowsPerPage;
            const end = start + rowsPerPage;
            const pageContributions = contributions.slice(start, end);
            
            // Create contributions table
            const contribTable = document.createElement('table');
            contribTable.style.width = '100%';
            contribTable.style.borderCollapse = 'collapse';
            
            // Table header
            const thead = document.createElement('thead');
            const headerRow = document.createElement('tr');
            const headers = ['Amount', 'Date', 'Status', 'Payment Evidence', 'Action'];
            headers.forEach(text => {
                const th = document.createElement('th');
                th.textContent = text;
                headerRow.appendChild(th);
            });
            thead.appendChild(headerRow);
            contribTable.appendChild(thead);
            
            // Table body
            const tbody = document.createElement('tbody');
            for (const contribution of pageContributions) {
                const row = tbody.insertRow();
                
                // Amount
                const amountCell = row.insertCell(0);
                amountCell.textContent = `R${contribution.amount}`;
                
                // Date
                const dateCell = row.insertCell(1);
                dateCell.textContent = contribution.date;
                
                // Status
                const statusCell = row.insertCell(2);
                if (contribution.status === 'confirmed') {
                    statusCell.textContent = '✅ Confirmed';
                } else if (contribution.status === 'missed') {
                    statusCell.textContent = '❌ Missed';
                } else {
                    statusCell.textContent = '⏳ Pending';
                }
                
                // Payment Evidence
                const evidenceCell = row.insertCell(3);
                if (contribution.paymentEvidence === 'online') {
                    evidenceCell.textContent = '💳 Online';

                    // Add View Receipt button
                    const receiptQuery = await getDocs(
                    query(collection(db, 'transactions'), where('contributionId', '==', contribution.id))
                    );
                    if (!receiptQuery.empty) {
                        const transactionId = receiptQuery.docs[0].id;
                        const receiptBtn = document.createElement('button');
                        receiptBtn.textContent = 'View Receipt';
                        receiptBtn.classList.add('btn', 'btn--outline', 'btn--sm');
                        receiptBtn.style.marginLeft = '0.5rem';
                        receiptBtn.addEventListener('click', async () => {
                            const { showReceiptModal } = await import('./js/payment-receipt.js');
                            await showReceiptModal(transactionId);
                        });
                        evidenceCell.appendChild(receiptBtn);
                       }

                } else if (contribution.paymentEvidence === 'proof' && contribution.evidenceUrl) {
                    evidenceCell.textContent = '📎 Proof uploaded';
                    const viewBtn = document.createElement('button');
                    viewBtn.textContent = 'View';
                    viewBtn.classList.add('btn', 'btn--outline', 'btn--sm');
                    viewBtn.addEventListener('click', () => {
                        window.open(contribution.evidenceUrl, '_blank');
                    });
                    evidenceCell.appendChild(viewBtn);
                } else {
                    evidenceCell.textContent = '—';
                }
                
                // Action
                const actionCell = row.insertCell(4);
                if (contribution.status === 'pending') {
                    const confirmBtn = document.createElement('button');
                    confirmBtn.textContent = 'Confirm';
                    confirmBtn.classList.add('btn', 'confirm', 'btn--sm');
                    confirmBtn.addEventListener('click', async () => {
                        confirmBtn.disabled = true;
                        confirmBtn.textContent = '...';
                        await updateContributionStatus(contribution.id, 'confirmed');
                        alert('Contribution confirmed successfully');
                        // Refresh the view
                        loadContributionsForGroup(activeGroupId, groupName);
                    });
                    
                    const missBtn = document.createElement('button');
                    missBtn.textContent = 'Miss';
                    missBtn.classList.add('btn', 'miss', 'btn--sm');
                    missBtn.addEventListener('click', async () => {
                        await updateContributionStatus(contribution.id, 'missed');
                        try {
                            await addDoc(collection(db, 'notifications'), {
                                userId: contribution.userId,
                                message: `You missed a payment of R${contribution.amount} for ${groupName}`,
                                read: false,
                                createdAt: new Date(),
                                contributionId: contribution.id
                            });
                        } catch (notifError) {
                            console.error('Failed to send notification:', notifError);
                        }
                        loadContributionsForGroup(activeGroupId, groupName);
                    });
                    
                    actionCell.appendChild(confirmBtn);
                    actionCell.appendChild(missBtn);
                } else {
                    actionCell.textContent = '-';
                }
            };
            contribTable.appendChild(tbody);
            
            // Clear container and add table
            container.innerHTML = '';
            container.appendChild(contribTable);
            
            // Add pagination controls - FIXED: Previous only shows on page > 1, Next only shows on page < totalPages
            const totalPages = Math.ceil(contributions.length / rowsPerPage);
            if (totalPages > 1) {
                const paginationDiv = document.createElement('div');
                paginationDiv.style.display = 'flex';
                paginationDiv.style.alignItems = 'center';
                paginationDiv.style.justifyContent = 'center';
                paginationDiv.style.gap = '0.5rem';
                paginationDiv.style.marginTop = '0.5rem';
                paginationDiv.style.padding = '0.5rem';
                
                // Previous button - only show if not on first page
                if (page > 1) {
                    const prevBtn = document.createElement('button');
                    prevBtn.textContent = 'Previous';
                    prevBtn.classList.add('btn', 'btn--secondary', 'btn--sm');
                    prevBtn.addEventListener('click', () => {
                        memberCurrentPage[memberId] = page - 1;
                        renderMemberContributions(memberId, memberName, contributions, container, groupName, rowsPerPage);
                    });
                    paginationDiv.appendChild(prevBtn);
                }
                
                const pageInfo = document.createElement('span');
                pageInfo.textContent = `Page ${page} of ${totalPages}`;
                pageInfo.style.fontSize = '0.85rem';
                paginationDiv.appendChild(pageInfo);
                
                // Next button - only show if not on last page
                if (page < totalPages) {
                    const nextBtn = document.createElement('button');
                    nextBtn.textContent = 'Next';
                    nextBtn.classList.add('btn', 'btn--secondary', 'btn--sm');
                    nextBtn.addEventListener('click', () => {
                        memberCurrentPage[memberId] = page + 1;
                        renderMemberContributions(memberId, memberName, contributions, container, groupName, rowsPerPage);
                    });
                    paginationDiv.appendChild(nextBtn);
                }
                
                container.appendChild(paginationDiv);
            }
        }

        async function displayContributionsTable(groupId, groupName, container) {
            if (activeUnsubscribe) {
                activeUnsubscribe();
                activeUnsubscribe = null;
            }

            container.innerHTML = '';

            const groupHeading = document.createElement('h2');
            groupHeading.textContent = `Managing group: ${groupName}`;
            container.appendChild(groupHeading);

            const backToGroupsButton = document.createElement('button');
            backToGroupsButton.textContent = 'Back to Groups';
            backToGroupsButton.classList.add('btn', 'btn--secondary');
            backToGroupsButton.addEventListener('click', () => {
                if (activeUnsubscribe) {
                    activeUnsubscribe();
                    activeUnsubscribe = null;
                }
                activeGroupId = null;
                loadManagePage();
            });
            container.appendChild(backToGroupsButton);

            // Create main table for member summary (collapsible rows)
            const mainTable = document.createElement('table');
            const thead = document.createElement('thead');
            const headerRow = document.createElement('tr');
            const headers = ['Member', 'Total Pending', 'Status', 'Action'];
            headers.forEach(text => {
                const th = document.createElement('th');
                th.textContent = text;
                headerRow.appendChild(th);
            });
            thead.appendChild(headerRow);
            mainTable.appendChild(thead);
            
            const mainTbody = document.createElement('tbody');
            mainTbody.id = `members-tbody-${groupId}`;
            mainTable.appendChild(mainTbody);
            container.appendChild(mainTable);

            const payoutButton = document.createElement('button');
            payoutButton.textContent = 'View Payout Schedule';
            payoutButton.classList.add('btn', 'btn--secondary');
            payoutButton.addEventListener('click', () => {
                window.location.href = `contributions-payout.html?groupId=${groupId}&returnTo=manage`;
            });
            container.appendChild(payoutButton);

            activeUnsubscribe = listenToGroupContributions(groupId, async (contributions) => {
                if (!contributions.length) return;
                
                // Group contributions by userId
                const contributionsByMember = {};
                for (const contribution of contributions) {
                    if (!contributionsByMember[contribution.userId]) {
                        contributionsByMember[contribution.userId] = [];
                    }
                    contributionsByMember[contribution.userId].push(contribution);
                }
                
                const mainTbodyElement = document.getElementById(`members-tbody-${groupId}`);
                if (!mainTbodyElement) return;
                mainTbodyElement.innerHTML = '';
                
                // Reset expanded states for this group
                for (const userId of Object.keys(contributionsByMember)) {
                    if (expandedMembers[`${groupId}-${userId}`] === undefined) {
                        expandedMembers[`${groupId}-${userId}`] = false;
                    }
                    if (memberCurrentPage[`${groupId}-${userId}`] === undefined) {
                        memberCurrentPage[`${groupId}-${userId}`] = 1;
                    }
                }
                
                // Build member rows
                for (const [userId, userContributions] of Object.entries(contributionsByMember)) {
                    const memberName = await getUserDisplayName(userId);
                    const pendingCount = userContributions.filter(c => c.status === 'pending').length;
                    const hasPending = pendingCount > 0;
                    const isExpanded = expandedMembers[`${groupId}-${userId}`];
                    
                    // Sort contributions by date (ascending - closest first)
                    userContributions.sort((a, b) => a.date.localeCompare(b.date));
                    
                    const memberRow = mainTbodyElement.insertRow();
                    memberRow.classList.add('member-row');
                    
                    // Expand/collapse icon cell
                    const iconCell = memberRow.insertCell(0);
                    const expandIcon = document.createElement('span');
                    expandIcon.className = 'expand-icon';
                    expandIcon.textContent = isExpanded ? '▼' : '▶';
                    iconCell.appendChild(expandIcon);
                    iconCell.appendChild(document.createTextNode(` ${memberName}`));
                    
                    // Total Pending cell
                    const pendingCell = memberRow.insertCell(1);
                    pendingCell.textContent = pendingCount > 0 ? `${pendingCount} pending` : 'None';
                    
                    // Status cell
                    const statusCell = memberRow.insertCell(2);
                    statusCell.textContent = hasPending ? '⏳ Pending' : '✅ Up to date';
                    
                    // Action cell
                    const actionCell = memberRow.insertCell(3);
                    actionCell.textContent = '-';
                    
                    // Create hidden row for contributions (will be shown/hidden)
                    const contribRow = mainTbodyElement.insertRow();
                    contribRow.classList.add('contributions-row');
                    contribRow.style.display = isExpanded ? '' : 'none';
                    
                    const contribCell = contribRow.insertCell(0);
                    contribCell.colSpan = 4;
                    contribCell.style.padding = '0';
                    
                    const contribContainer = document.createElement('div');
                    contribContainer.className = 'contributions-container';
                    contribContainer.id = `contrib-container-${groupId}-${userId}`;
                    contribCell.appendChild(contribContainer);
                    
                    // Render contributions in the container
                    await renderMemberContributions(
                        `${groupId}-${userId}`, 
                        memberName, 
                        userContributions, 
                        contribContainer,
                        groupName,  
                        5
                    );
                    
                    // Toggle expand/collapse on click
                    memberRow.addEventListener('click', () => {
                        const newExpanded = !expandedMembers[`${groupId}-${userId}`];
                        expandedMembers[`${groupId}-${userId}`] = newExpanded;
                        expandIcon.textContent = newExpanded ? '▼' : '▶';
                        contribRow.style.display = newExpanded ? '' : 'none';
                        
                        // Reset page when collapsing
                        if (!newExpanded) {
                            memberCurrentPage[`${groupId}-${userId}`] = 1;
                        }
                    });
                }
            });
        }

        async function loadContributionsForGroup(groupId, groupName) {
            activeGroupId = groupId;
            const container = document.getElementById('manageContent');
            await displayContributionsTable(groupId, groupName, container);
        }

        function displayNoGroupsMessage(container) {
            container.innerHTML = '';
            const p1 = document.createElement('p');
            p1.textContent = 'You are not assigned as a treasurer for any group.';
            const p2 = document.createElement('p');
            p2.textContent = 'Ask an Admin to assign you as treasurer.';
            const btn = document.createElement('button');
            btn.textContent = 'Go to Dashboard';
            btn.classList.add('btn', 'btn--primary');
            btn.addEventListener('click', goToDashboard);
            container.appendChild(p1);
            container.appendChild(p2);
            container.appendChild(btn);
        }

        async function loadManagePage() {
            const currentUserId = getCurrentUserId();
            if (!currentUserId) {
                window.location.href = 'login.html';
                return;
            }

            const userRole = await getCurrentUserRole();
            if (userRole !== 'Treasurer' && userRole !== 'Admin') {
                const container = document.getElementById('manageContent');
                container.innerHTML = '';
                const p = document.createElement('p');
                p.textContent = 'Access denied. Only Treasurers and Admins can access this page.';
                const btn = document.createElement('button');
                btn.textContent = 'Go to Dashboard';
                btn.classList.add('btn', 'btn--primary');
                btn.addEventListener('click', goToDashboard);
                container.appendChild(p);
                container.appendChild(btn);
                return;
            }

            const groups = await getTreasurerGroups(currentUserId);
            const container = document.getElementById('manageContent');

            if (activeUnsubscribe) {
                activeUnsubscribe();
                activeUnsubscribe = null;
            }

            if (groups.length === 0) {
                displayNoGroupsMessage(container);
            } else {
                displayGroupList(groups, container);
            }
        }

        // Hide pending disputes container by default
        const pendingContainer = document.getElementById('pendingDisputesContainer');
        if (pendingContainer) {
            pendingContainer.style.display = 'none';
        }

        // View Pending Disputes button handler
        document.getElementById('viewPendingDisputesBtn').addEventListener('click', async () => {
            const container = document.getElementById('pendingDisputesContainer');
            if (container.style.display === 'none') {
                await loadPendingDisputes();
                container.style.display = 'block';
                document.getElementById('viewPendingDisputesBtn').textContent = 'Hide Pending Disputes';
            } else {
                container.style.display = 'none';
                document.getElementById('viewPendingDisputesBtn').textContent = 'View Pending Disputes';
            }
        });

        // Wait for Firebase auth state before loading page data
        auth.onAuthStateChanged((user) => {
            if (!user) {
                window.location.href = 'login.html';
                return;
            }
            loadManagePage();
        });
        
        
    </script>

    <!-- Firebase compat SDK for navbar auth state -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="js/firebase-compat-init.js"></script>
    <script src="components/navbar.js"></script>
    <script src="components/footer.js"></script> 
</body>
</html>
