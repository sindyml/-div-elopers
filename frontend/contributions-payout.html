<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StokPal - Payout Schedule</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="css/theme.css">
    <link rel="stylesheet" href="css/app.css">
    <link rel="stylesheet" href="css/contributions.css">
</head>
<body class="app-layout">

    <header id="navbar-root"></header>

    <main class="app-main">
        <header class="page-header">
            <hgroup>
                <h1 class="page-header__title">Payout Schedule</h1>
                <p class="page-header__sub">View the ordered payout schedule for your stokvel group.</p>
            </hgroup>
        </header>
        <section id="payoutContent"></section>
    </main>

    <footer id="footer-root"></footer>

    <script type="module">
        import { auth, db } from './js/firebase-config.js';
        import { 
            getPayoutSchedule,
            getGroupById,
            getCurrentUserId,
            getUserGroups,
            getCurrentUserRole
        } from './js/contributions.js';
        import { disbursePayout } from './js/payoutService.js';
        import { doc, writeBatch, updateDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

        function getUrlParameter(name) {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get(name);
        }

        // ============================================================
        // EDIT PAYOUT ORDER MODAL (Treasurer/Admin only)
        // ============================================================
        async function openEditOrderModal(groupId, groupName, currentPayouts, refreshCallback) {
            // Create modal
            const modal = document.createElement('section');
            modal.classList.add('dispute-modal');
            
            const modalContent = document.createElement('article');
            modalContent.classList.add('dispute-modal-content');
            modalContent.style.width = '500px';
            modalContent.style.maxWidth = '90%';
            
            const title = document.createElement('h3');
            title.textContent = `Edit Payout Order - ${groupName}`;
            modalContent.appendChild(title);
            
            // Create list container
            const listContainer = document.createElement('ul');
            listContainer.style.listStyle = 'none';
            listContainer.style.padding = '0';
            listContainer.style.margin = '1rem 0';
            
            // Copy payouts for reordering
            let currentOrder = [...currentPayouts];
            
            function renderList() {
                listContainer.innerHTML = '';
                currentOrder.forEach((payout, index) => {
                    const listItem = document.createElement('li');
                    listItem.style.display = 'flex';
                    listItem.style.alignItems = 'center';
                    listItem.style.justifyContent = 'space-between';
                    listItem.style.padding = '0.75rem';
                    listItem.style.borderBottom = '1px solid #e0e0e0';
                    listItem.style.backgroundColor = index % 2 === 0 ? '#f9f9f9' : 'white';
                    
                    const position = document.createElement('span');
                    position.textContent = `${index + 1}.`;
                    position.style.fontWeight = 'bold';
                    position.style.minWidth = '35px';
                    
                    const name = document.createElement('span');
                    name.textContent = payout.userDisplayName;
                    name.style.flex = '1';
                    name.style.marginLeft = '0.5rem';
                    
                    const buttonGroup = document.createElement('div');
                    buttonGroup.style.display = 'flex';
                    buttonGroup.style.gap = '5px';
                    
                    if (index > 0) {
                        const upBtn = document.createElement('button');
                        upBtn.textContent = '↑';
                        upBtn.classList.add('btn', 'btn--sm');
                        upBtn.style.background = '#e0e0e0';
                        upBtn.style.color = '#333';
                        upBtn.addEventListener('click', () => {
                            // Swap with previous
                            [currentOrder[index - 1], currentOrder[index]] = [currentOrder[index], currentOrder[index - 1]];
                            renderList();
                        });
                        buttonGroup.appendChild(upBtn);
                    }
                    
                    if (index < currentOrder.length - 1) {
                        const downBtn = document.createElement('button');
                        downBtn.textContent = '↓';
                        downBtn.classList.add('btn', 'btn--sm');
                        downBtn.style.background = '#e0e0e0';
                        downBtn.style.color = '#333';
                        downBtn.addEventListener('click', () => {
                            // Swap with next
                            [currentOrder[index], currentOrder[index + 1]] = [currentOrder[index + 1], currentOrder[index]];
                            renderList();
                        });
                        buttonGroup.appendChild(downBtn);
                    }
                    
                    listItem.appendChild(position);
                    listItem.appendChild(name);
                    listItem.appendChild(buttonGroup);
                    listContainer.appendChild(listItem);
                });
            }
            
            renderList();
            modalContent.appendChild(listContainer);
            
            // Instructions
            const instructions = document.createElement('p');
            instructions.textContent = 'Use ↑ ↓ buttons to reorder members. The payout dates stay with the position.';
            instructions.style.fontSize = '0.8rem';
            instructions.style.color = '#666';
            instructions.style.margin = '0.5rem 0';
            modalContent.appendChild(instructions);
            
            // Action buttons
            const buttonContainer = document.createElement('div');
            buttonContainer.classList.add('dispute-modal-actions');
            buttonContainer.style.marginTop = '1rem';
            
            const cancelBtn = document.createElement('button');
            cancelBtn.textContent = 'Cancel';
            cancelBtn.classList.add('btn', 'btn--secondary');
            cancelBtn.addEventListener('click', () => modal.remove());
            
            const saveBtn = document.createElement('button');
            saveBtn.textContent = 'Save Order';
            saveBtn.classList.add('btn', 'btn--primary');
saveBtn.addEventListener('click', async () => {
    // Check if any changes were made
    let hasChanges = false;
    for (let i = 0; i < currentOrder.length; i++) {
        if (currentOrder[i].id !== currentPayouts[i].id) {
            hasChanges = true;
            break;
        }
    }
    
    if (!hasChanges) {
        alert('No changes made to the order.');
        modal.remove();
        return;
    }
    
    const batch = writeBatch(db);
    
    // For each position, update the payout document at that position
    // with the user from the payout that should now be there
    for (let i = 0; i < currentOrder.length; i++) {
        const payoutThatShouldBeHere = currentOrder[i];
        const currentPayoutAtThisPosition = currentPayouts[i];
        
        // If the user at this position changed
        if (payoutThatShouldBeHere.userId !== currentPayoutAtThisPosition.userId) {
            const payoutRef = doc(db, 'payouts', currentPayoutAtThisPosition.id);
            batch.update(payoutRef, {
                userId: payoutThatShouldBeHere.userId,
                userDisplayName: payoutThatShouldBeHere.userDisplayName
            });
        }
    }
    
    await batch.commit();
    alert('Payout order updated successfully!');
    modal.remove();
    refreshCallback(groupId);
});
            
            buttonContainer.appendChild(cancelBtn);
            buttonContainer.appendChild(saveBtn);
            modalContent.appendChild(buttonContainer);
            modal.appendChild(modalContent);
            document.body.appendChild(modal);
        }

        async function displayPayoutSchedule(groupId, groupName) {
            const container = document.getElementById('payoutContent');
            container.innerHTML = '';

            const headerContainer = document.createElement('div');
            headerContainer.style.display = 'flex';
            headerContainer.style.alignItems = 'center';
            headerContainer.style.justifyContent = 'space-between';
            headerContainer.style.marginBottom = '1rem';
            
            const groupHeading = document.createElement('h2');
            groupHeading.textContent = `Group: ${groupName}`;
            headerContainer.appendChild(groupHeading);

            // Back to Contributions button (visible to all users)
            const backBtn = document.createElement('button');
            backBtn.type = 'button';
            backBtn.classList.add('btn', 'btn--secondary');
            backBtn.style.marginLeft = '1rem';
            backBtn.innerHTML = `<svg width="14" height="14" viewBox="0 0 14 14" fill="none" aria-hidden="true" focusable="false">
              <path d="M12 7H2M7 2L2 7l5 5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
            </svg> Back to Contributions`;
            backBtn.addEventListener('click', () => { window.location.href = 'contributions-my.html'; });
            headerContainer.appendChild(backBtn);
            
            // Check if user is Treasurer or Admin to show Edit button
            const userRole = await getCurrentUserRole();
            if (userRole === 'Treasurer' || userRole === 'Admin') {
                const editOrderBtn = document.createElement('button');
                editOrderBtn.textContent = '✏️ Edit Payout Order';
                editOrderBtn.classList.add('btn', 'btn--secondary');
                editOrderBtn.style.marginLeft = '1rem';
                
                // Store reference to refresh function
                let refreshFunction = null;
                editOrderBtn.addEventListener('click', async () => {
                    const payouts = await getPayoutSchedule(groupId);
                    if (payouts.length === 0) {
                        alert('No payout schedule found to edit.');
                        return;
                    }
                    await openEditOrderModal(groupId, groupName, payouts, refreshDisplay);
                });
                headerContainer.appendChild(editOrderBtn);
            }
            
            container.appendChild(headerContainer);

            const payouts = await getPayoutSchedule(groupId);

            if (payouts.length === 0) {
                const noDataMessage = document.createElement('p');
                noDataMessage.textContent = 'No payout schedule found for this group.';
                container.appendChild(noDataMessage);
            } else {
                const table = document.createElement('table');
                const thead = document.createElement('thead');
                const headerRow = document.createElement('tr');

                // Add Status and Action columns
                const headers = ['Order', 'Member Name', 'Payout Date', 'Amount', 'Status', 'Action'];
                headers.forEach(text => {
                    const th = document.createElement('th');
                    th.textContent = text;
                    headerRow.appendChild(th);
                });
                thead.appendChild(headerRow);
                table.appendChild(thead);

                const tbody = document.createElement('tbody');
                payouts.forEach(payout => {
                    const row = tbody.insertRow();
                    const orderCell = row.insertCell(0);
                    orderCell.setAttribute('data-label', 'Order');
                    orderCell.textContent = payout.order;

                    const nameCell = row.insertCell(1);
                    nameCell.setAttribute('data-label', 'Member Name');
                    nameCell.textContent = payout.userDisplayName;

                    const dateCell = row.insertCell(2);
                    dateCell.setAttribute('data-label', 'Payout Date');
                    dateCell.textContent = payout.payoutDate;

                    const amountCell = row.insertCell(3);
                    amountCell.setAttribute('data-label', 'Amount');
                    amountCell.textContent = `R${payout.amount}`;

                    const statusCell = row.insertCell(4);
                    statusCell.setAttribute('data-label', 'Status');
                    const status = payout.status || 'pending';
                    statusCell.textContent = status === 'completed' ? '✅ Paid' : '⏳ Pending';

                    const actionCell = row.insertCell(5);
                    actionCell.setAttribute('data-label', 'Action');

                    if ((userRole === 'Treasurer' || userRole === 'Admin') && status !== 'completed') {
                        const disburseBtn = document.createElement('button');
                        disburseBtn.textContent = '💸 Disburse';
                        disburseBtn.classList.add('btn', 'btn--primary', 'btn--sm');
                        disburseBtn.addEventListener('click', async () => {
                            if (confirm(`Confirm disbursement of R${payout.amount} to ${payout.userDisplayName}?`)) {
                                try {
                                    disburseBtn.disabled = true;
                                    disburseBtn.textContent = 'Processing...';

                                    const result = await disbursePayout({
                                        groupId: groupId,
                                        memberId: payout.userId,
                                        amount: payout.amount,
                                        payoutId: payout.id,
                                        reference: `STOKPAL_PAYOUT_${payout.order}_${groupId.substring(0,5)}`
                                    });

                                    if (result.success) {
                                        alert('Payout disbursed successfully!');
                                        refreshDisplay(groupId);
                                    }
                                } catch (err) {
                                    console.error('Disbursement failed:', err);
                                    alert('Error: ' + err.message);
                                    disburseBtn.disabled = false;
                                    disburseBtn.textContent = '💸 Disburse';
                                }
                            }
                        });
                        actionCell.appendChild(disburseBtn);
                    } else if (status === 'completed') {
                        actionCell.textContent = '—';
                    } else {
                        actionCell.textContent = '—';
                    }
                });
                table.appendChild(tbody);
                container.appendChild(table);
            }
        }
        
        // Refresh function for after order change
        async function refreshDisplay(groupId) {
            const group = await getGroupById(groupId);
            if (group) {
                await displayPayoutSchedule(groupId, group.name);
            }
        }

        function displayError(message) {
            const container = document.getElementById('payoutContent');
            container.innerHTML = '';
            const p = document.createElement('p');
            p.textContent = message;
            container.appendChild(p);
        }

        function displayGroupSelector(groups) {
            const container = document.getElementById('payoutContent');
            container.innerHTML = '';
            const heading = document.createElement('h2');
            heading.textContent = 'Select a group to view payout schedule';
            container.appendChild(heading);

            const groupList = document.createElement('ul');
            groupList.style.listStyle = 'none';
            groupList.style.padding = '0';

            groups.forEach(group => {
                const listItem = document.createElement('li');
                listItem.style.margin = '1rem';
                listItem.style.padding = '1rem';
                listItem.style.border = '1px solid #ddd';
                listItem.style.borderRadius = '8px';

                const groupName = document.createElement('strong');
                groupName.textContent = group.name;
                listItem.appendChild(groupName);
                listItem.appendChild(document.createElement('br'));

                const viewButton = document.createElement('button');
                viewButton.textContent = 'View Payout Schedule';
                viewButton.classList.add('btn', 'btn--primary');
                viewButton.addEventListener('click', () => {
                    window.location.href = `contributions-payout.html?groupId=${group.id}&returnTo=dashboard`;
                });
                listItem.appendChild(viewButton);

                groupList.appendChild(listItem);
            });

            container.appendChild(groupList);
        }

        async function loadPayoutPage() {
            const currentUserId = getCurrentUserId();
            if (!currentUserId) {
                window.location.href = 'login.html';
                return;
            }

            let groupId = getUrlParameter('groupId');

            // If no groupId in URL, let user pick a group
            if (!groupId) {
                const groups = await getUserGroups(currentUserId);

                if (groups.length === 0) {
                    displayError('You are not a member of any group.');
                    return;
                }

                if (groups.length === 1) {
                    groupId = groups[0].id;
                } else {
                    displayGroupSelector(groups);
                    return;
                }
            }

            const group = await getGroupById(groupId);
            if (!group) {
                displayError('Group not found. Please go back and try again.');
                return;
            }

            await displayPayoutSchedule(groupId, group.name);
        }

        // Wait for Firebase auth state before loading page data
        auth.onAuthStateChanged((user) => {
            if (!user) {
                window.location.href = 'login.html';
                return;
            }
            loadPayoutPage();
        });
        
        
    </script>

    <!-- Firebase compat SDK for navbar auth state -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="js/firebase-compat-init.js"></script>
    <script src="components/navbar.js"></script>
    <script src="components/footer.js"></script> 
</body>
</html>
