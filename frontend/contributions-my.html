<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StokPal - My Contributions</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="css/theme.css">
    <link rel="stylesheet" href="css/app.css">
    <link rel="stylesheet" href="css/contributions.css">
    <link rel="stylesheet" href="css/payment.css" />
</head>
<body class="app-layout">

    <header id="navbar-root"></header>

    <main class="app-main">
        <header class="page-header">
            <hgroup>
                <h1 class="page-header__title">Contribution Tracking</h1>
                <p class="page-header__sub">View and track your stokvel contributions.</p>
            </hgroup>
        </header>

        <!-- User greeting -->
        <section id="user-greeting">
            <p>Hi, <strong id="userDisplayName">Member</strong> 👋</p>
            <button type="button" class="primary" onclick="window.location.href='dashboard.html'">
                <svg width="14" height="14" viewBox="0 0 14 14" fill="none" aria-hidden="true" focusable="false">
                 <path d="M2 7h10M7 2l5 5-5 5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
                Back to Dashboard
            </button>

            <button type="button" class="primary" onclick="window.location.href='payment.html'">
                <svg width="14" height="14" viewBox="0 0 14 14" fill="none" aria-hidden="true" focusable="false">
                 <path d="M2 7h10M7 2l5 5-5 5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
                Back to Payments
            </button>

        </section>

        <!-- YOUR DISPUTES section -->
        <section id="disputes-section" aria-labelledby="disputes-heading">
            <h2 id="disputes-heading">YOUR DISPUTES</h2>
            <button id="viewMyDisputesBtn" class="btn btn--primary">View My Disputes</button>
            <article id="myDisputesContainer" class="card" style="margin-top: var(--space-4);">
                <div class="data-table-wrapper">
                    <table class="data-table" aria-label="My disputes table">
                        <thead>
                            <tr>
                                <th>Group</th>
                                <th>Amount</th>
                                <th>Date Disputed</th>
                                <th>Status</th>
                                <th>Rejection Reason</th>
                            </tr>
                        </thead>
                        <tbody id="myDisputesTableBody"></tbody>
                    </table>
                </div>
            </article>
        </section>

        <section id="dynamicContent" aria-live="polite"></section>
    </main>

    <!-- Payment modal mount point -->
    <div id="payment-modal-root"></div>

    <footer id="footer-root"></footer>

    <script type="module">
        import { auth, db } from './js/firebase-config.js';
        import { 
            onSnapshot, 
            updateDoc, 
            doc
        } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
        import { 
            getCurrentUserId,
            getUserGroups,
            listenToMemberContributions,
            getUserDisplayName,
            getMemberDisputes,
            createDispute,
            listenToNotifications,
            
        } from './js/contributions.js';
        import { PaymentModal } from './components/payment-modal.js';
        import { uploadPaymentProof, validateProofFile } from './js/payment-upload.js';

        // ── Payment modal ────────────────────────────────────────
        const paymentModal = new PaymentModal();
        paymentModal.onPaymentSuccess = () => loadMyPage();
        paymentModal.onProofUploaded = async (file, paymentId) => {
            const user = auth.currentUser;
            if (!user) throw new Error('Not authenticated.');
            const err = validateProofFile(file);
            if (err) throw new Error(err);
            await uploadPaymentProof(file, paymentId, user.uid);
        };

        let activeGroupId = null;
        let activeUnsubscribe = null;
        let activeTableSection = null;
        let notificationsUnsubscribe = null;

        // Load user's display name from contributions.js
        async function loadUserDisplayNameWrapper(userId) {
            const displayName = await getUserDisplayName(userId);
            document.getElementById('userDisplayName').textContent = displayName;
        }

        // Load member's disputes from contributions.js
        async function loadMyDisputesWrapper(userId) {
            const disputes = await getMemberDisputes(userId);
            const tbody = document.getElementById('myDisputesTableBody');
            tbody.innerHTML = '';
            
            if (disputes.length === 0) {
                const row = tbody.insertRow();
                const cell = row.insertCell(0);
                cell.colSpan = 5;
                cell.textContent = 'No disputes found.';
                return;
            }
            
            disputes.forEach(dispute => {
                const row = tbody.insertRow();
                row.insertCell(0).textContent = dispute.groupName || '—';
                row.insertCell(1).textContent = `R${dispute.amount || 0}`;
                row.insertCell(2).textContent = dispute.createdAt || '—';
                
                let statusText = '';
                if (dispute.status === 'pending') statusText = '⏳ Pending';
                else if (dispute.status === 'approved') statusText = '✅ Approved';
                else if (dispute.status === 'rejected') statusText = '❌ Rejected';
                row.insertCell(3).textContent = statusText;
                row.insertCell(4).textContent = dispute.rejectionReason || '—';
            });
        }

        // Open dispute modal (calls createDispute from contributions.js)
        function openDisputeModal(contribution, groupName) {
            const modal = document.createElement('section');
            modal.classList.add('dispute-modal');
            
            const modalContent = document.createElement('article');
            modalContent.classList.add('dispute-modal-content');
            
            const title = document.createElement('h3');
            title.textContent = 'Dispute Missed Payment';
            modalContent.appendChild(title);
            
            const groupPara = document.createElement('p');
            groupPara.innerHTML = `<strong>Group:</strong> ${groupName}`;
            modalContent.appendChild(groupPara);
            
            const amountPara = document.createElement('p');
            amountPara.innerHTML = `<strong>Amount:</strong> R${contribution.amount}`;
            modalContent.appendChild(amountPara);
            
            const deadlinePara = document.createElement('p');
            deadlinePara.innerHTML = `<strong>Deadline:</strong> ${contribution.date}`;
            modalContent.appendChild(deadlinePara);
            
            const label = document.createElement('label');
            label.textContent = 'Reason for dispute:';
            modalContent.appendChild(label);
            
            const textarea = document.createElement('textarea');
            textarea.rows = 4;
            textarea.placeholder = 'Explain why this payment should not be marked as missed...';
            modalContent.appendChild(textarea);
            
            const buttonContainer = document.createElement('footer');
            buttonContainer.classList.add('dispute-modal-actions');
            
            const cancelBtn = document.createElement('button');
            cancelBtn.textContent = 'Cancel';
            cancelBtn.classList.add('btn', 'btn--secondary');
            cancelBtn.addEventListener('click', () => modal.remove());
            
            const submitBtn = document.createElement('button');
            submitBtn.textContent = 'Submit Dispute';
            submitBtn.classList.add('btn', 'btn--primary');
            submitBtn.addEventListener('click', async () => {
                const reason = textarea.value.trim();
                if (!reason) {
                    alert('Please enter a reason for your dispute.');
                    return;
                }
                await createDispute(
                    contribution.id,
                    contribution.userId,
                    contribution.groupId,
                    groupName,
                    contribution.amount,
                    contribution.date,
                    reason
                );
                alert('Dispute submitted. Treasurer will review it.');
                modal.remove();
            });
            
            buttonContainer.appendChild(cancelBtn);
            buttonContainer.appendChild(submitBtn);
            modalContent.appendChild(buttonContainer);
            modal.appendChild(modalContent);
            document.body.appendChild(modal);
        }

        // Show notification banner (UI only, logic in contributions.js)
        function showNotificationBanner(message, notificationId) {
            if (document.getElementById(`notif-${notificationId}`)) return;
            
            const banner = document.createElement('section');
            banner.id = `notif-${notificationId}`;
            banner.classList.add('notification-banner');

            const textElement = document.createElement('p');
            textElement.textContent = '🔔 ' + message;

            const dismissBtn = document.createElement('button');
            dismissBtn.textContent = 'Dismiss';
            dismissBtn.classList.add('notification-dismiss');
            dismissBtn.addEventListener('click', async () => {
                await updateDoc(doc(db, 'notifications', notificationId), {
                    read: true
                });
                banner.remove();
            });

            banner.appendChild(textElement);
            banner.appendChild(dismissBtn);
            
            const main = document.querySelector('main');
            main.insertBefore(banner, main.firstChild);
        }

        // Notification listener wrapper
        function listenToNotificationsWrapper(userId) {
            return listenToNotifications(userId, showNotificationBanner);
        }

        // ============================================================
        // FIXED: displayContributionsTable with dispute status awareness
        // ============================================================
        function displayContributionsTable(groupId, groupName, containerElement, showCollapseButton = true) {
            if (activeTableSection && activeTableSection.parentNode) {
                activeTableSection.remove();
            }
            if (activeUnsubscribe) {
                activeUnsubscribe();
                activeUnsubscribe = null;
            }

            const tableSection = document.createElement('section');
            tableSection.id = `contributions-table-${groupId}`;
            
            const heading = document.createElement('h3');
            heading.textContent = `Contributions for ${groupName}`;
            tableSection.appendChild(heading);

            if (showCollapseButton) {
                const collapseButton = document.createElement('button');
                collapseButton.textContent = 'Collapse';
                collapseButton.classList.add('btn', 'btn--secondary');
                collapseButton.addEventListener('click', () => {
                    if (activeTableSection && activeTableSection.parentNode) {
                        activeTableSection.remove();
                    }
                    if (activeUnsubscribe) {
                        activeUnsubscribe();
                        activeUnsubscribe = null;
                    }
                    activeTableSection = null;
                    activeGroupId = null;
                });
                tableSection.appendChild(collapseButton);
            }

            const table = document.createElement('table');
            const thead = document.createElement('thead');
            const headerRow = document.createElement('tr');
            const headers = ['Amount', 'Date', 'Status', 'Payment'];
            headers.forEach(text => {
                const th = document.createElement('th');
                th.textContent = text;
                headerRow.appendChild(th);
            });
            thead.appendChild(headerRow);
            table.appendChild(thead);

            const tbody = document.createElement('tbody');
            tbody.id = `contributions-body-${groupId}`;
            table.appendChild(tbody);
            tableSection.appendChild(table);

            containerElement.appendChild(tableSection);
            activeTableSection = tableSection;

            // ============================================================
            // FIX: Fetch member's disputes once and create a map for quick lookup
            // ============================================================
            const currentUserId = getCurrentUserId();
            let disputeMap = {};
            
            // Fetch disputes and build a map (contributionId -> dispute object)
            getMemberDisputes(currentUserId).then(disputes => {
                disputeMap = {};
                disputes.forEach(dispute => {
                    disputeMap[dispute.contributionId] = dispute;
                });
            }).catch(err => console.error('Failed to fetch disputes:', err));

            activeUnsubscribe = listenToMemberContributions(currentUserId, (allContributions) => {
                const groupContributions = allContributions.filter(c => c.groupId === groupId);
                const targetTbody = document.getElementById(`contributions-body-${groupId}`);
                if (!targetTbody) return;
                
                targetTbody.innerHTML = '';
                
                groupContributions.forEach(contribution => {
                    const row = targetTbody.insertRow();
                    const amountCell = row.insertCell(0);
                    amountCell.textContent = `R${contribution.amount}`;
                    const dateCell = row.insertCell(1);
                    dateCell.textContent = contribution.date;
                    
                    const statusCell = row.insertCell(2);
                    if (contribution.status === 'confirmed') {
                        statusCell.textContent = '✅ Confirmed';
                    } else if (contribution.status === 'missed') {
                        statusCell.textContent = '❌ Missed';
                        
                        // ============================================================
                        // FIX: Check if a dispute already exists for this contribution
                        // ============================================================
                        const existingDispute = disputeMap[contribution.id];
                        
                        if (!existingDispute) {
                            // No dispute yet - show Dispute button
                            const disputeBtn = document.createElement('button');
                            disputeBtn.textContent = 'Dispute';
                            disputeBtn.classList.add('btn', 'btn--outline', 'btn--sm');
                            disputeBtn.addEventListener('click', () => {
                                openDisputeModal(contribution, groupName);
                            });
                            statusCell.appendChild(disputeBtn);
                        } else if (existingDispute.status === 'pending') {
                            // Dispute already submitted and waiting for treasurer
                            const pendingText = document.createTextNode(' ⏳ Dispute Pending');
                            statusCell.appendChild(pendingText);
                        } else if (existingDispute.status === 'rejected') {
                            // Dispute was rejected - allow member to dispute again
                            const disputeAgainBtn = document.createElement('button');
                            disputeAgainBtn.textContent = 'Dispute Again';
                            disputeAgainBtn.classList.add('btn', 'btn--outline', 'btn--sm');
                            disputeAgainBtn.addEventListener('click', () => {
                                openDisputeModal(contribution, groupName);
                            });
                            statusCell.appendChild(disputeAgainBtn);
                        }
                        // If dispute is approved, contribution status would be 'confirmed' anyway
                        
                    } else {
                        statusCell.textContent = '⏳ Pending';
                    }

                    if (contribution.status === 'pending' || contribution.status === 'missed') {
                        const actionCell = row.insertCell(3);
                        const payBtn = document.createElement('button');
                        payBtn.textContent = '💳 Pay';
                        payBtn.classList.add('btn', 'btn--primary', 'btn--sm');
                        payBtn.addEventListener('click', () => {
                            const user = auth.currentUser;
                            if (!user) return;
                            paymentModal.open({
                                userId: user.uid,
                                groupId: contribution.groupId,
                                contributionId: contribution.id,
                                amount: parseFloat(contribution.amount) || 0,
                                groupName: groupName,
                            });
                        });
                        actionCell.appendChild(payBtn);
                    } else {
                        row.insertCell(3);
                    }
                });
            });
        }

        function displayGroupList(groups, container) {
            container.innerHTML = '';
            
            const instructions = document.createElement('p');
            instructions.textContent = 'Your groups:';
            container.appendChild(instructions);
            
            const groupList = document.createElement('ul');
            groupList.classList.add('group-list');
            
            groups.forEach(group => {
                const listItem = document.createElement('li');
                listItem.classList.add('group-list-item');
                
                const groupName = document.createElement('strong');
                groupName.textContent = group.name;
                listItem.appendChild(groupName);
                listItem.appendChild(document.createElement('br'));
                
                const viewContributionsBtn = document.createElement('button');
                viewContributionsBtn.textContent = 'View Contributions';
                viewContributionsBtn.classList.add('btn', 'btn--secondary');
                viewContributionsBtn.addEventListener('click', () => {
                    displayContributionsTable(group.id, group.name, container, true);
                });
                listItem.appendChild(viewContributionsBtn);
                
                const viewPayoutBtn = document.createElement('button');
                viewPayoutBtn.textContent = 'View Payout Schedule';
                viewPayoutBtn.classList.add('btn', 'btn--secondary');
                viewPayoutBtn.addEventListener('click', () => {
                    window.location.href = `contributions-payout.html?groupId=${group.id}&returnTo=my`;
                });
                listItem.appendChild(viewPayoutBtn);

                const makePaymentBtn = document.createElement('button');
                makePaymentBtn.textContent = '💳 Make Payment';
                makePaymentBtn.classList.add('btn', 'btn--primary', 'btn--sm');
                makePaymentBtn.addEventListener('click', () => {
                    const user = auth.currentUser;
                    if (!user) return;
                    paymentModal.open({
                        userId: user.uid,
                        groupId: group.id,
                        contributionId: `pending-${group.id}`,
                        amount: group.contributionAmount || 0,
                        groupName: group.name,
                    });
                });
                listItem.appendChild(makePaymentBtn);

                groupList.appendChild(listItem);
            });
            
            container.appendChild(groupList);
        }

        function displaySingleGroupTable(groups, container) {
            const singleGroup = groups[0];
            const heading = document.createElement('h2');
            heading.textContent = `Your contributions for group: ${singleGroup.name}`;
            container.appendChild(heading);
            
            const payoutBtn = document.createElement('button');
            payoutBtn.textContent = 'View Payout Schedule';
            payoutBtn.classList.add('btn', 'btn--secondary');
            payoutBtn.addEventListener('click', () => {
                window.location.href = `contributions-payout.html?groupId=${singleGroup.id}&returnTo=my`;
            });
            container.appendChild(payoutBtn);
            
            displayContributionsTable(singleGroup.id, singleGroup.name, container, false);
        }

        function displayNoGroupsMessage(container) {
            const message = document.createElement('p');
            message.textContent = 'You haven\'t joined any stokvel group yet.';
            container.appendChild(message);
            const subMessage = document.createElement('p');
            subMessage.textContent = 'Ask an Admin to add you to a group.';
            container.appendChild(subMessage);
        }

        async function loadMyPage() {
            const currentUserId = getCurrentUserId();
            if (!currentUserId) {
                window.location.href = 'login.html';
                return;
            }
            
            await loadUserDisplayNameWrapper(currentUserId);
            
            if (notificationsUnsubscribe) {
                notificationsUnsubscribe();
            }
            notificationsUnsubscribe = listenToNotificationsWrapper(currentUserId);
            
            const groups = await getUserGroups(currentUserId);
            const container = document.getElementById('dynamicContent');
            container.innerHTML = '';
            
            if (groups.length === 0) {
                displayNoGroupsMessage(container);
            } else if (groups.length === 1) {
                displaySingleGroupTable(groups, container);
            } else {
                displayGroupList(groups, container);
            }
        }

        // Hide disputes container by default
        const disputesContainer = document.getElementById('myDisputesContainer');
        if (disputesContainer) {
            disputesContainer.style.display = 'none';
        }

        // View My Disputes button handler
        document.getElementById('viewMyDisputesBtn').addEventListener('click', async () => {
            const currentUserId = getCurrentUserId();
            if (!currentUserId) return;
            const container = document.getElementById('myDisputesContainer');
            if (container.style.display === 'none') {
                await loadMyDisputesWrapper(currentUserId);
                container.style.display = 'block';
                document.getElementById('viewMyDisputesBtn').textContent = 'Hide My Disputes';
            } else {
                container.style.display = 'none';
                document.getElementById('viewMyDisputesBtn').textContent = 'View My Disputes';
            }
        });

        // Wait for Firebase auth state before loading page data
        auth.onAuthStateChanged((user) => {
            if (!user) {
                window.location.href = 'login.html';
                return;
            }
            loadMyPage();
        });
        
        
    </script>

    <!-- Firebase compat SDK for navbar auth state -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="js/firebase-compat-init.js"></script>
    <script src="components/navbar.js"></script>
    <script src="components/footer.js"></script> 
</body>
</html>
