<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StokPal - My Contributions</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="css/theme.css">
    <link rel="stylesheet" href="css/app.css">
    <link rel="stylesheet" href="css/contributions.css">
</head>
<body class="app-layout">

    <div id="navbar-root"></div>

    <main class="app-main">
        <header class="page-header">
            <hgroup>
                <h1 class="page-header__title">Contribution Tracking</h1>
                <p class="page-header__sub">View and track your stokvel contributions.</p>
            </hgroup>
        </header>
        <section id="dynamicContent"></section>
    </main>

    <div id="footer-root"></div>

    <script type="module">
        import { auth, db } from 'js/firebase-config.js';
        import { 
            collection, 
            query, 
            where, 
            orderBy, 
            onSnapshot, 
            updateDoc, 
            doc 
        } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
        import { 
            getCurrentUserId,
            getUserGroups,
            listenToMemberContributions
        } from 'js/contributions.js';

        let activeGroupId = null;
        let activeUnsubscribe = null;
        let activeTableSection = null;
        let notificationsUnsubscribe = null;

        // Show notification banner safely using DOM construction (no innerHTML)
        function showNotificationBanner(message, notificationId) {
            // Check if banner already exists for this notification
            if (document.getElementById(`notif-${notificationId}`)) return;
            
            const banner = document.createElement('div');
            banner.id = `notif-${notificationId}`;
            banner.style.backgroundColor = '#ff9800';
            banner.style.color = 'white';
            banner.style.padding = '12px 20px';
            banner.style.margin = '10px';
            banner.style.borderRadius = '8px';
            banner.style.display = 'flex';
            banner.style.justifyContent = 'space-between';
            banner.style.alignItems = 'center';
            banner.style.boxShadow = '0 2px 5px rgba(0,0,0,0.2)';

            const textSpan = document.createElement('span');
            textSpan.textContent = '🔔 ' + message;

            const dismissBtn = document.createElement('button');
            dismissBtn.textContent = 'Dismiss';
            dismissBtn.style.cssText = 'background:white; color:#ff9800; border:none; padding:5px 10px; border-radius:5px; cursor:pointer;';
            dismissBtn.addEventListener('click', async () => {
                await updateDoc(doc(db, 'notifications', notificationId), {
                    read: true
                });
                banner.remove();
            });

            banner.appendChild(textSpan);
            banner.appendChild(dismissBtn);
            
            // Insert at top of main content
            const main = document.querySelector('main');
            main.insertBefore(banner, main.firstChild);
        }

        // NEW: Listen for notifications
        function listenToNotifications(userId) {
            const q = query(
                collection(db, 'notifications'),
                where('userId', '==', userId),
                where('read', '==', false),
                orderBy('createdAt', 'desc')
            );
            
            return onSnapshot(q, (snapshot) => {
                snapshot.docChanges().forEach(change => {
                    if (change.type === 'added') {
                        const notification = change.doc.data();
                        const notificationId = change.doc.id;
                        showNotificationBanner(notification.message, notificationId);
                    }
                });
            });
        }

        function displayContributionsTable(groupId, groupName, containerElement, showCollapseButton = true) {
            // Remove active table if exists
            if (activeTableSection && activeTableSection.parentNode) {
                activeTableSection.remove();
            }
            if (activeUnsubscribe) {
                activeUnsubscribe();
                activeUnsubscribe = null;
            }

            const tableSection = document.createElement('section');
            tableSection.id = `contributions-table-${groupId}`;
            
            const heading = document.createElement('h3');
            heading.textContent = `Contributions for ${groupName}`;
            tableSection.appendChild(heading);

            // Only add Collapse button if showCollapseButton is true (for 2+ groups)
            if (showCollapseButton) {
                const collapseButton = document.createElement('button');
                collapseButton.textContent = 'Collapse';
                collapseButton.style.marginBottom = '1rem';
                collapseButton.addEventListener('click', () => {
                    if (activeTableSection && activeTableSection.parentNode) {
                        activeTableSection.remove();
                    }
                    if (activeUnsubscribe) {
                        activeUnsubscribe();
                        activeUnsubscribe = null;
                    }
                    activeTableSection = null;
                    activeGroupId = null;
                });
                tableSection.appendChild(collapseButton);
            }

            const table = document.createElement('table');
            const thead = document.createElement('thead');
            const headerRow = document.createElement('tr');
            const headers = ['Amount', 'Date', 'Status'];
            headers.forEach(text => {
                const th = document.createElement('th');
                th.textContent = text;
                headerRow.appendChild(th);
            });
            thead.appendChild(headerRow);
            table.appendChild(thead);

            const tbody = document.createElement('tbody');
            tbody.id = `contributions-body-${groupId}`;
            table.appendChild(tbody);
            tableSection.appendChild(table);

            containerElement.appendChild(tableSection);
            activeTableSection = tableSection;

            activeUnsubscribe = listenToMemberContributions(getCurrentUserId(), (allContributions) => {
                const groupContributions = allContributions.filter(c => c.groupId === groupId);
                const targetTbody = document.getElementById(`contributions-body-${groupId}`);
                if (!targetTbody) return;
                
                targetTbody.innerHTML = '';
                
                groupContributions.forEach(contribution => {
                    const row = targetTbody.insertRow();
                    const amountCell = row.insertCell(0);
                    amountCell.setAttribute('data-label', 'Amount');
                    amountCell.textContent = `R${contribution.amount}`;
                    const dateCell = row.insertCell(1);
                    dateCell.setAttribute('data-label', 'Date');
                    dateCell.textContent = contribution.date;
                    
                    const statusCell = row.insertCell(2);
                    statusCell.setAttribute('data-label', 'Status');
                    if (contribution.status === 'confirmed') {
                        statusCell.textContent = '✅ Confirmed';
                    } else if (contribution.status === 'missed') {
                        statusCell.textContent = '❌ Missed';
                    } else {
                        statusCell.textContent = '⏳ Pending';
                    }
                });
            });
        }

        function displayGroupList(groups, container) {
            container.innerHTML = '';
            
            const instructions = document.createElement('p');
            instructions.textContent = 'Your groups:';
            container.appendChild(instructions);
            
            const groupList = document.createElement('ul');
            groupList.style.listStyle = 'none';
            groupList.style.padding = '0';
            
            groups.forEach(group => {
                const listItem = document.createElement('li');
                listItem.style.marginBottom = '1rem';
                listItem.style.padding = '1rem';
                listItem.style.border = '1px solid #ddd';
                listItem.style.borderRadius = '8px';
                
                const groupName = document.createElement('strong');
                groupName.textContent = group.name;
                listItem.appendChild(groupName);
                listItem.appendChild(document.createElement('br'));
                
                const viewContributionsBtn = document.createElement('button');
                viewContributionsBtn.textContent = 'View Contributions';
                viewContributionsBtn.style.marginRight = '0.5rem';
                viewContributionsBtn.addEventListener('click', () => {
                    displayContributionsTable(group.id, group.name, container, true);
                });
                listItem.appendChild(viewContributionsBtn);
                
                const viewPayoutBtn = document.createElement('button');
                viewPayoutBtn.textContent = 'View Payout Schedule';
                viewPayoutBtn.addEventListener('click', () => {
                    window.location.href = `contributions-payout.html?groupId=${group.id}&returnTo=my`;
                });
                listItem.appendChild(viewPayoutBtn);
                
                groupList.appendChild(listItem);
            });
            
            container.appendChild(groupList);
        }

        function displaySingleGroupTable(groups, container) {
            const singleGroup = groups[0];
            const heading = document.createElement('h2');
            heading.textContent = `Your contributions for group: ${singleGroup.name}`;
            container.appendChild(heading);
            
            // Add View Payout button for single group
            const payoutBtn = document.createElement('button');
            payoutBtn.textContent = 'View Payout Schedule';
            payoutBtn.style.marginBottom = '1rem';
            payoutBtn.addEventListener('click', () => {
                window.location.href = `contributions-payout.html?groupId=${singleGroup.id}&returnTo=my`;
            });
            container.appendChild(payoutBtn);
            
            // NO collapse button for single group (showCollapseButton = false)
            displayContributionsTable(singleGroup.id, singleGroup.name, container, false);
        }

        function displayNoGroupsMessage(container) {
            container.innerHTML = `
                <p>You haven't joined any stokvel group yet.</p>
                <p>Ask an Admin to add you to a group.</p>
            `;
        }

        async function loadMyPage() {
            const currentUserId = getCurrentUserId();
            if (!currentUserId) {
                window.location.href = 'login.html';
                return;
            }
            
            // Start listening for notifications
            if (notificationsUnsubscribe) {
                notificationsUnsubscribe();
            }
            notificationsUnsubscribe = listenToNotifications(currentUserId);
            
            const groups = await getUserGroups(currentUserId);
            const container = document.getElementById('dynamicContent');
            container.innerHTML = '';
            
            if (groups.length === 0) {
                displayNoGroupsMessage(container);
            } else if (groups.length === 1) {
                displaySingleGroupTable(groups, container);
            } else {
                displayGroupList(groups, container);
            }
        }

        // Wait for Firebase auth state before loading page data
        auth.onAuthStateChanged((user) => {
            if (!user) {
                window.location.href = 'login.html';
                return;
            }
            loadMyPage();
        });
    </script>

    <!-- Firebase compat SDK for navbar auth state -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="js/firebase-compat-init.js"></script>
    <script src="components/navbar.js"></script>
    <script src="components/footer.js"></script>
</body>
</html>
