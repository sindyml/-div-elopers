<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Edit Group</title>

  <link rel="stylesheet" href="../css/theme.css">
  <link rel="stylesheet" href="../css/app.css">
  <link rel="stylesheet" href="../css/forms.css">
</head>
<body>

<main class="app-main">

  <header class="page-header">
    <h1>Edit Group</h1>
    <p>Update group details and settings.</p>
  </header>

  <section
    class="card"
    aria-labelledby="edit-group-heading"
  >

    <h2 id="edit-group-heading">
      Group Information
    </h2>

    <form id="editForm">

      <label for="name">
        Group Name
      </label>

      <input
        type="text"
        id="name"
        placeholder="Group Name"
        required
      />

      <label for="amount">
        Contribution Amount
      </label>

      <input
        type="number"
        id="amount"
        placeholder="Contribution Amount"
        required
      />

      <label for="payout">
        Payout Order
      </label>

      <input
        type="text"
        id="payout"
        placeholder="Payout Order (comma separated UIDs)"
      />

      <label for="frequency">
        Meeting Frequency
      </label>

      <select id="frequency">
        <option value="weekly">Weekly</option>
        <option value="monthly">Monthly</option>
      </select>

      <button type="submit">
        Update Group
      </button>

    </form>

  </section>

  <section
    aria-live="polite"
    aria-label="Status Messages"
  >
    <p id="message"></p>
  </section>

  <nav aria-label="Group Navigation">
    <a href="dashboard.html">
      ← Back to Dashboard
    </a>
  </nav>

</main>

<script type="module">
import { db, auth } from "../src/firebase.js";
import { doc, getDoc } from "firebase/firestore";
import { updateGroup } from "../src/groupService.js";
import { listenForAuth } from "../src/auth.js";

const form = document.getElementById("editForm");
const message = document.getElementById("message");

// Getting the groupId from URL
const params = new URLSearchParams(window.location.search);
const groupId = params.get("groupId");

let userRole = null;

//Wait for authentication before loading data
listenForAuth(async (user) => {
  if (!user) {
    message.textContent = "You must be logged in";
    return;
  }

  if (!groupId) {
    message.textContent = "No group selected";
    return;
  }

  try {
    //Load group data
    const groupSnap = await getDoc(doc(db, "groups", groupId));

    if (!groupSnap.exists()) {
      message.textContent = "Group not found";
      return;
    }

    const data = groupSnap.data();

    // Pre-fill form
    document.getElementById("name").value = data.name;
    document.getElementById("amount").value = data.contributionAmount;
    document.getElementById("payout").value = (data.payoutOrder || []).join(", ");
    document.getElementById("frequency").value = data.meetingFrequency;

    //Get user role
    const roleSnap = await getDoc(
      doc(db, "groups", groupId, "members", user.uid)
    );

    if (roleSnap.exists()) {
      userRole = roleSnap.data().role;
    }

  } catch (err) {
    console.error(err);
    message.textContent = "Error loading group";
  }
});

//Submit update
form.addEventListener("submit", async (e) => {
  e.preventDefault();

  if (userRole !== "admin") {
    message.textContent = "Only admin can edit this group";
    return;
  }

  const name = document.getElementById("name").value;
  const amount = document.getElementById("amount").value;
  const payout = document.getElementById("payout").value;
  const frequency = document.getElementById("frequency").value;

  const payoutOrder = payout
    ? payout.split(",").map(p => p.trim())
    : [];

  message.textContent = "⏳ Updating group...";

  try {
    await updateGroup(groupId, {
      name,
      contributionAmount: Number(amount),
      payoutOrder,
      meetingFrequency: frequency
    });

    message.textContent = "Group updated successfully!";
  } catch (err) {
    console.error(err);
    message.textContent = "Error: " + err.message;
  }
});
</script>

</body>
</html>
