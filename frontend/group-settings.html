<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Group Settings</title>
  <link rel="stylesheet" href="../styles/theme.css">
  <link rel="stylesheet" href="../styles/app.css">
  <link rel="stylesheet" href="../styles/forms.css">
</head>
<body>

<main>
  <h2>Group Settings</h2>

  <!-- Group Info -->
  <section>
    <h3>Group Details</h3>
    <p id="groupName"></p>
    <p id="groupAmount"></p>
    <p id="groupFrequency"></p>
  </section>

  <!-- Members -->
  <section>
    <h3>Members</h3>
    <ul id="memberList"></ul>
  </section>

  <!-- Admin Controls -->
  <section id="adminSection" hidden>
    <h3>Admin Controls</h3>
    <button id="editBtn">Edit Group</button>
    <button id="deleteBtn">Delete Group</button>
  </section>

  <p id="message"></p>

  <a href="dashboard.html">← Back to Dashboard</a>
</main>

<script type="module">
import { db } from "../src/firebase.js";
import { doc, getDoc, collection, getDocs } from "firebase/firestore";
import { listenForAuth } from "../src/auth.js";
import {
  deleteGroup,
  assignTreasurer,
  assignAdmin
} from "../src/groupService.js";

const groupName = document.getElementById("groupName");
const groupAmount = document.getElementById("groupAmount");
const groupFrequency = document.getElementById("groupFrequency");
const memberList = document.getElementById("memberList");
const adminSection = document.getElementById("adminSection");
const message = document.getElementById("message");

const editBtn = document.getElementById("editBtn");
const deleteBtn = document.getElementById("deleteBtn");

// Get groupId from URL
const params = new URLSearchParams(window.location.search);
const groupId = params.get("groupId");

let currentUser = null;
let userRole = null;

// 🔐 Wait for auth
listenForAuth(async (user) => {
  if (!user) {
    message.textContent = "You must be logged in";
    return;
  }

  currentUser = user;

  if (!groupId) {
    message.textContent = "No group selected";
    return;
  }

  try {
    // 🔥 Load group info
    const groupSnap = await getDoc(doc(db, "groups", groupId));
    if (!groupSnap.exists()) {
      message.textContent = "Group not found";
      return;
    }

    const data = groupSnap.data();
    groupName.textContent = `Name: ${data.name}`;
    groupAmount.textContent = `Contribution: ${data.contributionAmount}`;
    groupFrequency.textContent = `Frequency: ${data.meetingFrequency}`;

    // 🔐 Load user role
    const roleSnap = await getDoc(
      doc(db, "groups", groupId, "members", user.uid)
    );

    if (roleSnap.exists()) {
      userRole = roleSnap.data().role;

      if (userRole === "admin") {
        adminSection.hidden = false;
      }
    }

    // 👥 Load members
    const memberSnap = await getDocs(
      collection(db, "groups", groupId, "members")
    );

    memberList.innerHTML = "";

    memberSnap.forEach(docSnap => {

  const m = docSnap.data();

  const li =
    document.createElement("li");

  li.style.marginBottom =
    "1rem";

  li.style.padding =
    "1rem";

  li.style.border =
    "1px solid #ccc";

  li.style.borderRadius =
    "8px";

  li.innerHTML = `

    <strong>${m.uid}</strong>

    <p>
      Role:
      <strong>${m.role}</strong>
    </p>

  `;

  // ====================================
  // ADMIN ROLE CONTROLS
  // ====================================

  if (
    userRole === "admin"
    
  ) if (m.uid === currentUser.uid) {
  return;
}{

    const treasurerBtn =
      document.createElement("button");

    treasurerBtn.textContent =
      "Make Treasurer";

    treasurerBtn.style.marginRight =
      "0.5rem";

    treasurerBtn.onclick =
      async () => {

        try {

          await assignTreasurer(
            groupId,
            m.uid
          );

          alert(
            "Treasurer updated successfully"
          );

          window.location.reload();

        } catch (err) {

          console.error(err);

          alert(
            "Failed to assign treasurer"
          );
        }
      };

    const adminBtn =
      document.createElement("button");

    adminBtn.textContent =
      "Make Admin";

    adminBtn.onclick =
      async () => {

        try {

          await assignAdmin(
            groupId,
            m.uid
          );

          alert(
            "Admin updated successfully"
          );

          window.location.reload();

        } catch (err) {

          console.error(err);

          alert(
            "Failed to assign admin"
          );
        }
      };

    li.appendChild(
      treasurerBtn
    );

    li.appendChild(
      adminBtn
    );
  }

  memberList.appendChild(li);
});

  } catch (err) {
    console.error(err);
    message.textContent = "Error loading group";
  }
});

// ✏️ Edit
editBtn.onclick = () => {
  window.location.href = `edit-group.html?groupId=${groupId}`;
};

// 🗑️ Delete
deleteBtn.onclick = async () => {
  if (userRole !== "admin") {
    message.textContent = "Only admin can delete group";
    return;
  }

  const confirmed = confirm("Are you sure you want to delete this group?");
  if (!confirmed) return;

  message.textContent = "⏳ Deleting group...";

  try {
    await deleteGroup(groupId);
    window.location.href = "dashboard.html";
  } catch (err) {
    console.error(err);
    message.textContent = "Error deleting group";
  }
};
</script>

</body>
</html>
