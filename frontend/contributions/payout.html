<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StokPal - Payout Schedule</title>
    <link rel="stylesheet" href="contributions.css">
</head>
<body>

    <header>
        <h1>StokPal</h1>
        <nav>
            <button id="dashboardButton">Dashboard</button>
            <button id="backButton">Back</button>
            <button id="logoutButton">Logout</button>
        </nav>
    </header>

    <main>
        <h1>Payout Schedule</h1>
        <section id="payoutContent"></section>
    </main>

    <script type="module">
        import { auth } from '../js/firebase-config.js';
        import { signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
        import { 
            getPayoutSchedule,
            getGroupById,
            getCurrentUserId
        } from './contributions.js';

        function getUrlParameter(name) {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get(name);
        }

        async function logout() {
            try {
                await signOut(auth);
                window.location.href = 'login.html';
            } catch (error) {
                console.error('Logout failed:', error);
            }
        }

        function goToDashboard() {
            window.location.href = 'dashboard.html';
        }

        function goBack() {
            if (document.referrer && document.referrer !== '') {
                window.history.back();
            } else {
                window.location.href = 'dashboard.html';
            }
        }

        async function displayPayoutSchedule(groupId, groupName) {
            const container = document.getElementById('payoutContent');
            container.innerHTML = '';

            const groupHeading = document.createElement('h2');
            groupHeading.textContent = `Group: ${groupName}`;
            container.appendChild(groupHeading);

            const payouts = await getPayoutSchedule(groupId);

            if (payouts.length === 0) {
                const noDataMessage = document.createElement('p');
                noDataMessage.textContent = 'No payout schedule found for this group.';
                container.appendChild(noDataMessage);
            } else {
                const table = document.createElement('table');
                const thead = document.createElement('thead');
                const headerRow = document.createElement('tr');
                const headers = ['Order', 'Member Name', 'Payout Date', 'Amount'];
                headers.forEach(text => {
                    const th = document.createElement('th');
                    th.textContent = text;
                    headerRow.appendChild(th);
                });
                thead.appendChild(headerRow);
                table.appendChild(thead);

                const tbody = document.createElement('tbody');
                payouts.forEach(payout => {
                    const row = tbody.insertRow();
                    const orderCell = row.insertCell(0);
                    orderCell.setAttribute('data-label', 'Order');
                    orderCell.textContent = payout.order;
                    const nameCell = row.insertCell(1);
                    nameCell.setAttribute('data-label', 'Member Name');
                    nameCell.textContent = payout.userDisplayName;
                    const dateCell = row.insertCell(2);
                    dateCell.setAttribute('data-label', 'Payout Date');
                    dateCell.textContent = payout.payoutDate;
                    const amountCell = row.insertCell(3);
                    amountCell.setAttribute('data-label', 'Amount');
                    amountCell.textContent = `R${payout.amount}`;
                });
                table.appendChild(tbody);
                container.appendChild(table);
            }
        }

        function displayError(message) {
            const container = document.getElementById('payoutContent');
            container.innerHTML = '';
            const p = document.createElement('p');
            p.textContent = message;
            container.appendChild(p);
        }

        async function loadPayoutPage() {
            const currentUserId = getCurrentUserId();
            if (!currentUserId) {
                window.location.href = 'login.html';
                return;
            }

            const groupId = getUrlParameter('groupId');

            if (!groupId) {
                displayError('No group selected. Please go back and choose a group.');
                return;
            }

            const group = await getGroupById(groupId);
            if (!group) {
                displayError('Group not found. Please go back and try again.');
                return;
            }

            await displayPayoutSchedule(groupId, group.name);
        }

        document.getElementById('dashboardButton').addEventListener('click', goToDashboard);
        document.getElementById('backButton').addEventListener('click', goBack);
        document.getElementById('logoutButton').addEventListener('click', logout);

        loadPayoutPage();
    </script>
</body>
</html>
