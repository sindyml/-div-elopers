<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Create Group — StokPal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/theme.css" />
  <link rel="stylesheet" href="css/register.css" />
</head>
<body>
  <main class="register-page">
    <article class="register-card">
      <header class="register-card__header">
        <strong class="register-card__logo">StokPal</strong>
        <h1 class="register-card__title">Create Stokvel Group</h1>
        <p class="register-card__sub">Set up a new group and start saving together</p>
      </header>

      <section class="register-card__body">
        <aside id="message" class="alert alert--hidden" aria-live="polite"></aside>

        <form id="groupForm" class="register-form">
          <div class="form-group">
            <label for="name" class="form-label">Group Name</label>
            <input type="text" id="name" class="form-input" placeholder="e.g. Kasi Savers" required />
          </div>

          <div class="form-group">
            <label for="amount" class="form-label">Contribution Amount (R)</label>
            <input type="number" id="amount" class="form-input" placeholder="e.g. 500" required />
          </div>

          <div class="form-group">
            <label for="payout" class="form-label">Payout Order</label>
            <input type="text" id="payout" class="form-input" placeholder="Comma-separated member UIDs" />
          </div>

          <div class="form-group">
            <label for="frequency" class="form-label">Meeting Frequency</label>
            <select id="frequency" class="form-input form-select">
              <option value="weekly">Weekly</option>
              <option value="monthly">Monthly</option>
            </select>
          </div>

          <button type="submit" class="btn btn--primary btn--full">Create Group</button>
        </form>
      </section>

      <footer class="register-card__footer">
        <p><a href="dashboard.html">← Back to Dashboard</a></p>
      </footer>
    </article>
  </main>

  <!-- Firebase SDKs -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="js/firebase-compat-init.js"></script>
  <script>
  (function () {
    const db   = firebase.firestore();
    const auth = firebase.auth();

    const form    = document.getElementById('groupForm');
    const message = document.getElementById('message');

    function showMsg(text, type) {
      message.textContent = text;
      message.className = 'alert alert--' + type;
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();

      const name      = document.getElementById('name').value.trim();
      const amount    = document.getElementById('amount').value;
      const payout    = document.getElementById('payout').value;
      const frequency = document.getElementById('frequency').value;

      // Parse and normalize payout order: filter empty entries and de-duplicate
      let payoutOrder = [];
      if (payout) {
        const rawOrder = payout.split(',').map(p => p.trim()).filter(p => p.length > 0);
        payoutOrder = [...new Set(rawOrder)]; // Remove duplicates

        // Validate that UIDs are non-empty and look reasonable
        if (payoutOrder.length > 0 && payoutOrder.some(uid => uid.length < 3)) {
          showMsg('Invalid payout order: UIDs must be at least 3 characters', 'error');
          return;
        }
      }

      if (!auth.currentUser) {
        showMsg('You must be logged in.', 'error');
        return;
      }

      showMsg('Creating group…', 'success');

      try {
        const groupRef = await db.collection('groups').add({
          name,
          contributionAmount: Number(amount),
          payoutOrder,
          totalBalance: 0,
          meetingFrequency: frequency,
          createdBy: auth.currentUser.uid,
          createdAt: firebase.firestore.FieldValue.serverTimestamp()
        });

        await groupRef.collection('members').doc(auth.currentUser.uid).set({
          uid: auth.currentUser.uid,
          role: 'admin',
          joinedAt: firebase.firestore.FieldValue.serverTimestamp()
        });

        // Create a membership record for quick dashboard lookups
        await db.collection('memberships').doc(auth.currentUser.uid + '_' + groupRef.id).set({
          uid: auth.currentUser.uid,
          groupId: groupRef.id
        });

        // Initialize payouts if order provided
        if (payoutOrder.length > 0) {
          const batch = db.batch();

          const payoutDetailsPromises = payoutOrder.map(async (uid, i) => {
            let displayName = 'Member ' + (i + 1);
            try {
              const userDoc = await db.collection('users').doc(uid).get();
              if (userDoc.exists) {
                displayName = userDoc.data().displayName || userDoc.data().name || userDoc.data().email || displayName;
              }
            } catch (e) {
              console.warn('Could not fetch user name for payout:', uid);
            }
            return { uid, displayName, order: i + 1 };
          });

          const payoutDetails = await Promise.all(payoutDetailsPromises);

          for (const detail of payoutDetails) {
            // Calculate payout date using calendar months instead of hard-coded 30 days
            const payoutDate = new Date();
            payoutDate.setMonth(payoutDate.getMonth() + (detail.order - 1));

            const payoutRef = db.collection('payouts').doc();
            batch.set(payoutRef, {
              groupId: groupRef.id,
              userId: detail.uid,
              userDisplayName: detail.displayName,
              order: detail.order,
              amount: Number(amount),
              payoutDate: firebase.firestore.Timestamp.fromDate(payoutDate),
              status: 'pending'
            });
          }
          await batch.commit();
        }

        showMsg('Group created successfully!', 'success');
        form.reset();
      } catch (err) {
        console.error(err);
        showMsg('Error: ' + err.message, 'error');
      }
    });
  })();
  </script>
</body>
</html>
