<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>Create Group — StokPal</title>

  <!-- Fonts -->
  <link
    rel="preconnect"
    href="https://fonts.googleapis.com"
  />

  <link
    rel="preconnect"
    href="https://fonts.gstatic.com"
    crossorigin
  />

  <link
    href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&display=swap"
    rel="stylesheet"
  />

  <!-- Styles -->
  <link
    rel="stylesheet"
    href="css/theme.css"
  />

  <link
    rel="stylesheet"
    href="css/register.css"
  />
</head>

<body>

  <!-- NAVBAR -->
  <header id="navbar-root"></header>

  <!-- MAIN -->
  <main class="register-page">

    <article class="register-card">

      <!-- HEADER -->
      <header class="register-card__header">

        <strong class="register-card__logo">
          StokPal
        </strong>

        <h1 class="register-card__title">
          Create Stokvel Group
        </h1>

        <p class="register-card__sub">
          Set up a new group and start saving together
        </p>

      </header>

      <!-- BODY -->
      <section class="register-card__body">

        <!-- MESSAGE -->
        <aside
          id="message"
          class="alert alert--hidden"
          aria-live="polite"
        ></aside>

        <!-- FORM -->
        <form
          id="groupForm"
          class="register-form"
        >

          <!-- GROUP NAME -->
          <div class="form-group">

            <label
              for="name"
              class="form-label"
            >
              Group Name
            </label>

            <input
              type="text"
              id="name"
              class="form-input"
              placeholder="e.g. Kasi Savers"
              required
            />

          </div>

          <!-- CONTRIBUTION -->
          <div class="form-group">

            <label
              for="amount"
              class="form-label"
            >
              Contribution Amount (R)
            </label>

            <input
              type="number"
              id="amount"
              class="form-input"
              placeholder="e.g. 500"
              required
            />

          </div>

          <!-- PAYOUT ORDER -->
          <div class="form-group">

            <label
              for="payout"
              class="form-label"
            >
              Payout Order
            </label>

            <input
              type="text"
              id="payout"
              class="form-input"
              placeholder="Comma-separated member UIDs"
            />

          </div>

          <!-- FREQUENCY -->
          <div class="form-group">

            <label
              for="frequency"
              class="form-label"
            >
              Meeting Frequency
            </label>

            <select
              id="frequency"
              class="form-input form-select"
            >

              <option value="weekly">
                Weekly
              </option>

              <option value="monthly">
                Monthly
              </option>

            </select>

          </div>

          <!-- SUBMIT -->
          <button
            type="submit"
            class="btn btn--primary btn--full"
          >
            Create Group
          </button>

        </form>

      </section>

      <!-- FOOTER -->
      <footer class="register-card__footer">

        <p>
          <a href="dashboard.html">
            ← Back to Dashboard
          </a>
        </p>

      </footer>

    </article>

  </main>

  <!-- FOOTER -->
  <footer id="footer-root"></footer>

  <!-- ========================================= -->
  <!-- MODULAR FIREBASE SCRIPT -->
  <!-- ========================================= -->

  <script type="module">

    // =========================================
    // IMPORTS
    // =========================================

    import {
      auth,
      db
    }
    from "./js/firebase-config.js";

    import {
      collection,
      addDoc,
      doc,
      setDoc,
      getDoc,
      writeBatch,
      serverTimestamp,
      Timestamp
    }
    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    import {
      onAuthStateChanged
    }
    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

    // =========================================
    // ELEMENTS
    // =========================================

    const form =
      document.getElementById(
        "groupForm"
      );

    const message =
      document.getElementById(
        "message"
      );

    // =========================================
    // SHOW MESSAGE
    // =========================================

    function showMsg(text, type) {

      message.textContent = text;

      message.className =
        "alert alert--" + type;
    }

    // =========================================
    // AUTH CHECK
    // =========================================

    onAuthStateChanged(
      auth,
      (user) => {

        if (!user) {

          window.location.href =
            "login.html";
        }
      }
    );

    // =========================================
    // FORM SUBMIT
    // =========================================

    form.addEventListener(
      "submit",
      async (e) => {

        e.preventDefault();

        const user =
          auth.currentUser;

        if (!user) {

          showMsg(
            "You must be logged in.",
            "error"
          );

          return;
        }

        try {

          // ===================================
          // FORM VALUES
          // ===================================

          const name =
            document.getElementById("name")
              .value
              .trim();

          const amount =
            Number(
              document.getElementById("amount")
                .value
            );

          const payout =
            document.getElementById("payout")
              .value;

          const frequency =
            document.getElementById("frequency")
              .value;

          // ===================================
          // PAYOUT ORDER
          // ===================================

          let payoutOrder = [];

          if (payout) {

            payoutOrder =
              [
                ...new Set(
                  payout
                    .split(",")
                    .map(p => p.trim())
                    .filter(Boolean)
                )
              ];

            // Validate UIDs
            if (
              payoutOrder.some(
                uid => uid.length < 3
              )
            ) {

              showMsg(
                "Invalid payout order.",
                "error"
              );

              return;
            }
          }

          showMsg(
            "Creating group...",
            "success"
          );

          // ===================================
          // CREATE GROUP
          // ===================================

          const groupRef =
            await addDoc(
              collection(db, "groups"),
              {

                name,

                contributionAmount:
                  amount,

                payoutOrder,

                totalBalance: 0,

                meetingFrequency:
                  frequency,

                createdBy:
                  user.uid,

                createdAt:
                  serverTimestamp()
              }
            );

          // ===================================
          // ADD ADMIN MEMBER
          // ===================================

          await setDoc(
            doc(
              db,
              "groups",
              groupRef.id,
              "members",
              user.uid
            ),
            {

              uid: user.uid,

              role: "admin",

              joinedAt:
                serverTimestamp()
            }
          );

          // ===================================
          // MEMBERSHIP RECORD
          // ===================================

          await setDoc(
            doc(
              db,
              "memberships",
              `${user.uid}_${groupRef.id}`
            ),
            {

              uid: user.uid,

              groupId:
                groupRef.id
            }
          );

          // ===================================
          // OPTIONAL PAYOUTS
          // ===================================

          if (payoutOrder.length > 0) {

            const batch =
              writeBatch(db);

            for (
              let i = 0;
              i < payoutOrder.length;
              i++
            ) {

              const uid =
                payoutOrder[i];

              let displayName =
                `Member ${i + 1}`;

              try {

                const userDoc =
                  await getDoc(
                    doc(db, "users", uid)
                  );

                if (userDoc.exists()) {

                  displayName =
                    userDoc.data().displayName
                    || userDoc.data().name
                    || userDoc.data().email
                    || displayName;
                }

              } catch (err) {

                console.warn(
                  "Could not fetch user:",
                  err
                );
              }

              // Payout date
              const payoutDate =
                new Date();

              payoutDate.setMonth(
                payoutDate.getMonth() + i
              );

              const payoutRef =
                doc(
                  collection(
                    db,
                    "payouts"
                  )
                );

              batch.set(
                payoutRef,
                {

                  groupId:
                    groupRef.id,

                  userId: uid,

                  userDisplayName:
                    displayName,

                  order: i + 1,

                  amount,

                  payoutDate:
                    Timestamp.fromDate(
                      payoutDate
                    ),

                  status:
                    "pending"
                }
              );
            }

            await batch.commit();
          }

          // ===================================
          // OPTIONAL:
          // HANDLE GROUP CREATION LOGIC
          // ===================================

          try {

            const {
              handleGroupCreation
            }
            =
            await import(
              "./js/onGroupCreate.js"
            );

            await handleGroupCreation(
              groupRef.id
            );

          } catch (err) {

            console.warn(
              "onGroupCreate.js skipped:",
              err
            );
          }

          // ===================================
          // SUCCESS
          // ===================================

          showMsg(
            "Group created successfully! Redirecting...",
            "success"
          );

          form.reset();

          setTimeout(() => {

            window.location.href =
              "dashboard.html";

          }, 1500);

        } catch (err) {

          console.error(err);

          showMsg(
            "Error: " + err.message,
            "error"
          );
        }
      }
    );

  </script>

  <!-- COMPONENTS -->
  <script src="components/navbar.js"></script>
  <script src="components/footer.js"></script>

</body>
</html>
