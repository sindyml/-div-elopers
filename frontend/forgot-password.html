<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password - StokPal</title>
  <link rel="stylesheet" href="css/theme.css">
  <link rel="stylesheet" href="css/auth.css">
</head>
<body>
  <main class="auth-page">
    <article class="auth-card">
      <header class="auth-card__header">
        <h1 class="auth-card__title">Reset password</h1>
        <p class="auth-card__sub">We'll send you a link to reset your password</p>
      </header>

      <section class="auth-card__body">
        <aside id="alertMessage" class="alert alert--hidden" aria-live="polite"></aside>

        <form id="resetForm">
          <div class="form-group">
            <label class="form-label" for="email">Email address</label>
            <input type="email" id="email" class="form-input" placeholder="you@example.com" required>
          </div>
          <button type="submit" class="btn btn--primary btn--full">Send reset email</button>
        </form>

        <hr class="divider">

        <div class="auth-footer">
          <a href="login.html">Back to login</a>
        </div>
      </section>

      <section class="spam-note">
           <p class="spam-warning">Check your spam/junk folder if you don't see the email within a few minutes.</p>
      </section>
    </article>
  </main>

  <script type="module" src="js/forgot-password.js"></script>
</body>
</html>
